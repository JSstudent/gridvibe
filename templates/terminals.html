<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GridVibe — Terminals</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='vendor/xterm.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/tokens.css') }}?v={{ version }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/terminals.css') }}?v={{ version }}">
</head>
<body
    data-voice-enabled="{{ 'true' if voice_enabled else 'false' }}"
    data-voice-engine="{{ voice_engine | e }}"
    data-voice-model="{{ voice_model | e }}"
    data-voice-language="{{ voice_language | e }}"
    data-voice-worklet-url="{{ url_for('static', filename='voice-capture-worklet.js') }}"
    data-terminal-font-size="{{ terminal_font_size }}"
    data-terminal-font-family="{{ terminal_font_family | e }}"
>

<!-- Top bar -->
<div class="topbar" id="terminalTopbar">
    <div class="topbar-brand">
        <img
            class="topbar-icon"
            src="/docs/images/GridVibe_icon.ico"
            alt="GridVibe"
            width="28"
            height="28"
        >
        <div class="app-menu" id="sessionsMenuRoot">
            <button
                type="button"
                class="btn btn-neutral app-menu-toggle"
                id="sessionsMenuBtn"
                onclick="toggleSessionsMenu(event)"
                aria-haspopup="true"
                aria-expanded="false"
            >Sessions...</button>
            <div class="app-menu-panel" id="sessionsMenu" role="menu" aria-labelledby="sessionsMenuBtn">
                <button
                    type="button"
                    class="app-menu-item"
                    role="menuitem"
                    onclick="closeSessionsMenu(); return openNewSessionSelector(event);"
                >Import Session ...</button>
                <button
                    type="button"
                    class="app-menu-item"
                    id="saveSessionMenuItem"
                    role="menuitem"
                    onclick="closeSessionsMenu(); saveActiveWorkspaceSession(this);"
                >Save Session</button>
                <button
                    type="button"
                    class="app-menu-item"
                    id="saveSessionAsMenuItem"
                    role="menuitem"
                    onclick="closeSessionsMenu(); saveActiveWorkspaceSessionAs(this);"
                >Save Session as ...</button>
                <button
                    type="button"
                    class="app-menu-item"
                    id="saveAllSessionsMenuItem"
                    role="menuitem"
                    onclick="closeSessionsMenu(); saveAllWorkspaceSessions(this);"
                >Save All Sessions</button>
            </div>
        </div>
        <div class="app-menu" id="workspaceMenuRoot">
            <button
                type="button"
                class="btn btn-neutral app-menu-toggle"
                id="workspaceMenuBtn"
                onclick="toggleWorkspaceMenu(event)"
                aria-haspopup="true"
                aria-expanded="false"
            >Workspace...</button>
            <div class="app-menu-panel" id="workspaceMenu" role="menu" aria-labelledby="workspaceMenuBtn">
                <button
                    type="button"
                    class="app-menu-item"
                    id="saveWorkspaceItem"
                    role="menuitem"
                    onclick="closeWorkspaceMenu(); saveWorkspace(this);"
                >Save Workspace</button>
            </div>
        </div>
        <span class="topbar-sub" id="sessionLabel">Loading…</span>
    </div>
    <div class="topbar-actions">
        <button class="btn btn-neutral" id="themeToggleBtn" onclick="cycleTheme()" title="Toggle theme"><svg class="theme-toggle-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>Dark</button>
        <button
            class="btn btn-cyan btn-icon"
            onclick="refreshStatuses()"
            title="Refresh all"
            aria-label="Refresh all"
        >
            <svg class="refresh-all-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <path d="M20 11a8.1 8.1 0 0 0-15.5-2M4 5v4h4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M4 13a8.1 8.1 0 0 0 15.5 2M20 19v-4h-4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </button>
        <button
            class="btn btn-neutral btn-icon surface-mode-btn"
            id="surfaceModeBtn"
            onclick="toggleSurfaceMode()"
            title="Max surface"
            aria-label="Max surface"
            aria-pressed="false"
        >
            <svg class="surface-mode-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <rect x="4" y="4" width="16" height="16" rx="2.5" fill="none" stroke="currentColor" stroke-width="1.8"/>
                <path d="M12 12H7m0 0 3-3m-3 3 3 3M12 12h5m0 0-3-3m3 3-3 3M12 12V7m0 0-3 3m3-3 3 3M12 12v5m0 0-3-3m3 3 3-3" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </button>
        <button
            class="btn btn-neutral btn-icon broadcast-btn"
            id="broadcastBtn"
            onclick="toggleBroadcastInput()"
            title="Broadcast typing to all terminal panes"
            aria-label="Broadcast typing to all terminal panes"
            aria-pressed="false"
        >
            <svg class="broadcast-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false"><path d="M4.9 19.1C1 15.2 1 8.8 4.9 4.9"></path><path d="M7.8 16.2c-2.3-2.3-2.3-6.1 0-8.5"></path><circle cx="12" cy="12" r="2"></circle><path d="M16.2 7.8c2.3 2.3 2.3 6.1 0 8.5"></path><path d="M19.1 4.9C23 8.8 23 15.1 19.1 19"></path></svg>
        </button>
        <button
            class="btn btn-success btn-icon"
            id="fullscreenBtn"
            onclick="toggleFullscreen()"
            title="Enter fullscreen"
            aria-label="Enter fullscreen"
            aria-pressed="false"
        ><svg class="fullscreen-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false"><polyline points="15 3 21 3 21 9"></polyline><polyline points="9 21 3 21 3 15"></polyline><line x1="21" y1="3" x2="14" y2="10"></line><line x1="3" y1="21" x2="10" y2="14"></line></svg></button>
        <a
            href="/"
            class="btn btn-neutral btn-icon settings-window-btn"
            onclick="return goToSettings(event)"
            title="Open settings"
            aria-label="Open settings"
        >
            <svg class="vibe-flow-icon" viewBox="0 0 32 32" aria-hidden="true" focusable="false">
                <rect x="5" y="7" width="22" height="18" rx="5" fill="none" stroke="currentColor" stroke-width="1.4"/>
                <path d="M9 11.5h14" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
                <path d="M12 15l4 4-4 4" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M18 22h5" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
            </svg>
        </a>
    </div>
</div>

<div class="session-bar">
    <div class="session-tabs" id="sessionTabs"></div>
    <button
        type="button"
        class="topbar-toggle-btn"
        id="topbarToggleBtn"
        onclick="toggleTopbarVisibility()"
        title="Hide top bar"
        aria-label="Hide top bar"
        aria-expanded="true"
        aria-controls="terminalTopbar"
    >
        <svg class="topbar-toggle-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path id="topbarTogglePath" d="M6 15l6-6 6 6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
    </button>
</div>

<!-- Grid (built dynamically) -->
<div id="terminalsGrid"></div>
<div id="terminalResizeOverlay" aria-hidden="true"></div>

<!-- Empty state -->
<div id="emptyState">
    <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/>
        <line x1="12" y1="17" x2="12" y2="21"/>
    </svg>
    <p>No active sessions.</p>
    <a href="/" onclick="return goToSettings(event)">Launch terminals →</a>
</div>

<div id="savedSessionsModal" class="modal-shell" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="savedSessionsTitle">
        <div class="modal-head">
            <div>
                <div id="savedSessionsTitle" class="modal-title">Import Saved Session</div>
                <div class="modal-copy">Pick one saved launcher setup to launch as a new session.</div>
            </div>
            <button class="btn btn-neutral" type="button" onclick="closeSavedSessionModal()">Close</button>
        </div>
        <div id="savedSessionsList" class="saved-session-list"></div>
        <div class="modal-actions">
            <div id="savedSessionsFooterCopy" class="modal-copy"></div>
            <div class="modal-actions-buttons">
                <button class="btn btn-neutral" type="button" onclick="closeSavedSessionModal()">Cancel</button>
            </div>
        </div>
    </div>
</div>

<div id="saveSessionAsModal" class="modal-shell" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="saveSessionAsTitle">
        <div class="modal-head">
            <div>
                <div id="saveSessionAsTitle" class="modal-title">Save Session As</div>
                <div class="modal-copy">Create a saved session from the current workspace.</div>
            </div>
            <button class="btn btn-neutral" type="button" onclick="closeSaveSessionAsModal()">Close</button>
        </div>
        <form id="saveSessionAsForm" class="modal-form">
            <div class="modal-field">
                <label for="saveSessionAsName">Session name</label>
                <input id="saveSessionAsName" class="modal-input" type="text" autocomplete="off">
            </div>
            <label class="modal-check" for="saveSessionAsOpenNow">
                <input id="saveSessionAsOpenNow" type="checkbox">
                <span>Open session now</span>
            </label>
        </form>
        <div class="modal-actions">
            <div id="saveSessionAsFooterCopy" class="modal-copy"></div>
            <div class="modal-actions-buttons">
                <button class="btn btn-neutral" type="button" onclick="closeSaveSessionAsModal()">Cancel</button>
                <button class="btn btn-primary" type="submit" form="saveSessionAsForm">Save</button>
            </div>
        </div>
    </div>
</div>

<div id="closeSessionConfirmModal" class="modal-shell" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="closeSessionConfirmTitle">
        <div class="modal-head">
            <div>
                <div id="closeSessionConfirmTitle" class="modal-title">Close session?</div>
                <div id="closeSessionConfirmCopy" class="modal-copy"></div>
            </div>
        </div>
        <div class="modal-actions">
            <div class="modal-copy">Live terminals are memory-only and cannot be recovered.</div>
            <div class="modal-actions-buttons">
                <button id="closeSessionConfirmCancel" class="btn btn-neutral" type="button">Cancel</button>
                <button id="closeSessionConfirmAccept" class="btn btn-danger" type="button">Close session</button>
            </div>
        </div>
    </div>
</div>

<div id="genericConfirmModal" class="modal-shell" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="genericConfirmTitle">
        <div class="modal-head">
            <div>
                <div id="genericConfirmTitle" class="modal-title">Are you sure?</div>
                <div id="genericConfirmCopy" class="modal-copy"></div>
            </div>
        </div>
        <div class="modal-actions">
            <div id="genericConfirmNote" class="modal-copy" hidden></div>
            <div class="modal-actions-buttons">
                <button id="genericConfirmCancel" class="btn btn-neutral" type="button">Cancel</button>
                <button id="genericConfirmAccept" class="btn btn-danger" type="button">Confirm</button>
            </div>
        </div>
    </div>
</div>

<script src="{{ url_for('static', filename='vendor/xterm.min.js') }}"></script>
<script src="{{ url_for('static', filename='vendor/xterm-addon-fit.min.js') }}"></script>
<script src="{{ url_for('static', filename='vendor/xterm-addon-search.min.js') }}"></script>
<script src="{{ url_for('static', filename='vendor/xterm-addon-web-links.min.js') }}"></script>
<script src="{{ url_for('static', filename='vendor/socket.io.min.js') }}"></script>
<script src="{{ url_for('static', filename='vendor/mermaid.min.js') }}"></script>
<script>
    const DEFAULT_SURFACE_MODE = {{ app_surface_mode|tojson }};
    const MAX_SESSIONS = {{ max_sessions | tojson }};
</script>
<script src="{{ url_for('static', filename='js/shared.js') }}?v={{ version }}"></script>
<script src="{{ url_for('static', filename='js/terminal-icons.js') }}?v={{ version }}"></script>
<script src="{{ url_for('static', filename='js/voice-input.js') }}?v={{ version }}"></script>
<script src="{{ url_for('static', filename='js/explorer-viewer.js') }}?v={{ version }}"></script>
<script src="{{ url_for('static', filename='js/terminals.js') }}?v={{ version }}"></script>
</body>
</html>
