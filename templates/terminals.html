<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GridVibe — Terminals</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css">
    <style>
        :root {

            --t-border-dim: #232323;
            --t-border-card: #272727;
            --t-border-tab: #2d2d2d;
            --t-text: #e0e0e0;
            --t-text-secondary: #bdbdbd;

            --t-success: #18b66a;

            --t-ctx-border: #333;
            --t-ctx-hover: #2a2a2a;
            --t-spinner-track: #2a2a2a;
            --t-empty-text: #444;
            --t-voice-bg: #12161b;
            --t-voice-border: #2a3741;
            --t-voice-input-bg: #0d1115;
            --t-voice-input-text: #e7edf4;
            --t-voice-title: #f4f7fb;
            --t-voice-meta: #8294a8;
            --t-voice-label: #9fb2c4;
            --t-voice-badge-bg: #15202b;
            --t-voice-badge-border: #2e4050;
            --t-voice-badge-text: #9ec4ff;
            --t-voice-toggle-bg: #2a3741;
            --t-voice-toggle-knob: #e7edf4;
            --t-voice-status-bg: #101820;
            --t-voice-status-border: #22303a;
            --t-voice-status-text: #c5d7e6;
            --t-voice-details-bg: #0d1318;
            --t-voice-details-border: #22303a;
            --t-voice-details-title: #dce8f4;
            --t-voice-diag-title: #91a5b9;
            --t-voice-pre-bg: #081018;
            --t-voice-pre-border: #15212b;
            --t-voice-pre-text: #b9d0e3;
            --t-voice-partial-bg: #1a1a2e;
            --t-voice-partial-border: #333;
            --t-voice-partial-text: #8888aa;
            --explorer-bg: #0f141b;
            --explorer-bar-bg: #151c24;
            --explorer-border: #2b3744;
            --explorer-row-border: #1f2a35;
            --explorer-row-hover: #182636;
            --explorer-row-active: #17324a;
            --explorer-text: #e6edf3;
            --explorer-muted: #94a3b8;
            --explorer-folder: #f0b35b;
            --explorer-file: #9fb2c8;
        }

        [data-theme="light"] {
            --t-bg: #f0f2f5;
            --t-topbar: #ffffff;
            --t-tabs-bg: #f8f9fa;
            --t-card: #ffffff;
            --t-card-header: #f3f4f6;
            --t-terminal-bg: #0d0d0d;
            --t-border: #b7c0cc;
            --t-border-dim: #cfd6df;
            --t-border-card: #b7c0cc;
            --t-border-tab: #aeb7c2;
            --t-text: #111827;
            --t-text-secondary: #1f2937;
            --t-text-muted: #4b5563;
            --t-text-placeholder: #6b7280;
            --t-accent: #087f9b;
            --t-accent-hover: #0e7490;
            --t-success: #047857;
            --t-success-hover: #059669;
            --t-btn-bg: #f3f4f6;
            --t-btn-text: #1f2937;
            --t-btn-hover-bg: #e5e7eb;
            --t-btn-neutral: #f3f4f6;
            --t-btn-neutral-text: #1f2937;
            --t-btn-neutral-hover: #e5e7eb;
            --t-ctx-bg: #ffffff;
            --t-ctx-border: #d1d5db;
            --t-ctx-hover: #f3f4f6;
            --t-spinner-track: #d1d5db;
            --t-empty-text: #9ca3af;
            --t-voice-bg: #ffffff;
            --t-voice-border: #d1d5db;
            --t-voice-input-bg: #f9fafb;
            --t-voice-input-text: #1f2937;
            --t-voice-title: #111827;
            --t-voice-meta: #6b7280;
            --t-voice-label: #4b5563;
            --t-voice-badge-bg: #eff6ff;
            --t-voice-badge-border: #bfdbfe;
            --t-voice-badge-text: #1d4ed8;
            --t-voice-toggle-bg: #d1d5db;
            --t-voice-toggle-knob: #ffffff;
            --t-voice-status-bg: #f9fafb;
            --t-voice-status-border: #e5e7eb;
            --t-voice-status-text: #374151;
            --t-voice-details-bg: #f9fafb;
            --t-voice-details-border: #e5e7eb;
            --t-voice-details-title: #1f2937;
            --t-voice-diag-title: #6b7280;
            --t-voice-pre-bg: #f3f4f6;
            --t-voice-pre-border: #e5e7eb;
            --t-voice-pre-text: #374151;
            --t-voice-partial-bg: #ffffff;
            --t-voice-partial-border: #d1d5db;
            --t-voice-partial-text: #6b7280;
            --explorer-bg: #ffffff;
            --explorer-bar-bg: #f6f8fb;
            --explorer-border: #cfd6df;
            --explorer-row-border: #e8edf3;
            --explorer-row-hover: #edf6ff;
            --explorer-row-active: #dbeafe;
            --explorer-text: #111827;
            --explorer-muted: #5f6f85;
            --explorer-folder: #c56f05;
            --explorer-file: #64748b;
        }

        [data-theme="dark"] {
            --explorer-bg: #0f141b;
            --explorer-bar-bg: #151c24;
            --explorer-border: #2b3744;
            --explorer-row-border: #1f2a35;
            --explorer-row-hover: #182636;
            --explorer-row-active: #17324a;
            --explorer-text: #e6edf3;
            --explorer-muted: #94a3b8;
            --explorer-folder: #f0b35b;
            --explorer-file: #9fb2c8;
        }

        .explorer-pane[data-explorer-theme="light"] {
            --explorer-bg: #ffffff;
            --explorer-bar-bg: #f6f8fb;
            --explorer-border: #cfd6df;
            --explorer-row-border: #e8edf3;
            --explorer-row-hover: #edf6ff;
            --explorer-row-active: #dbeafe;
            --explorer-text: #111827;
            --explorer-muted: #5f6f85;
            --explorer-folder: #c56f05;
            --explorer-file: #64748b;
        }

        .explorer-pane[data-explorer-theme="dark"] {
            --explorer-bg: #0f141b;
            --explorer-bar-bg: #151c24;
            --explorer-border: #2b3744;
            --explorer-row-border: #1f2a35;
            --explorer-row-hover: #182636;
            --explorer-row-active: #17324a;
            --explorer-text: #e6edf3;
            --explorer-muted: #94a3b8;
            --explorer-folder: #f0b35b;
            --explorer-file: #9fb2c8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--t-bg);
            min-height: 100vh;
            color: var(--t-text);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* ── Top bar ── */
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 18px;
            background: var(--t-topbar);
            border-bottom: 1px solid var(--t-border);
            flex-shrink: 0;
            height: 50px;
        }

        .session-bar {
            display: flex;
            align-items: stretch;
            background: var(--t-tabs-bg);
            border-bottom: 1px solid var(--t-border-dim);
            flex-shrink: 0;
            min-width: 0;
        }

        .session-tabs {
            display: flex;
            flex: 1 1 auto;
            gap: 8px;
            align-items: center;
            padding: 10px 18px 8px;
            overflow-x: auto;
            min-width: 0;
        }

        .session-tab {
            border: 1px solid var(--t-border-tab);
            background: var(--t-card);
            color: var(--t-text-secondary);
            border-radius: 9px;
            padding: 8px 12px;
            font-size: .8rem;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: background .18s, border-color .18s, color .18s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .session-tab.draggable {
            user-select: none;
        }

        .session-tab:hover {
            border-color: var(--tab-color, var(--t-accent));
            color: var(--t-text);
        }

        .session-tab.active {
            background: var(--tab-color-bg, rgba(0, 217, 255, 0.14));
            border-color: var(--tab-color, var(--t-accent));
            color: var(--tab-color, var(--t-accent));
        }

        .session-tab.settings {
            background: rgba(0, 196, 110, 0.16);
            border-color: #00c46e;
            color: #7ef0b4;
        }

        .session-tab.settings:hover {
            background: rgba(0, 196, 110, 0.24);
            border-color: #1add88;
            color: #cffff0;
        }

        .session-tab.save {
            background: rgba(37, 99, 235, 0.16);
            border-color: #3b82f6;
            color: #bfdbfe;
        }

        .session-tab.save:hover {
            background: rgba(37, 99, 235, 0.24);
            border-color: #60a5fa;
            color: #eff6ff;
        }

        .session-tab.save:disabled {
            cursor: wait;
            opacity: 0.65;
        }

        [data-theme="light"] .session-tab {
            box-shadow: 0 1px 0 rgba(15, 23, 42, 0.04);
        }

        [data-theme="light"] .session-tab.settings {
            background: #ecfdf5;
            border-color: rgba(4, 120, 87, 0.55);
            color: #047857;
        }

        [data-theme="light"] .session-tab.settings:hover {
            background: #d1fae5;
            border-color: rgba(4, 120, 87, 0.75);
            color: #065f46;
        }

        [data-theme="light"] .session-tab.save {
            background: #eff6ff;
            border-color: rgba(37, 99, 235, 0.55);
            color: #1d4ed8;
        }

        [data-theme="light"] .session-tab.save:hover {
            background: #dbeafe;
            border-color: rgba(37, 99, 235, 0.75);
            color: #1e40af;
        }

        .session-tab.dragging {
            opacity: 0.45;
        }

        .session-tab.drag-target {
            border-color: var(--tab-color, var(--t-accent));
            box-shadow: inset 0 0 0 1px var(--tab-color-shadow, rgba(0, 217, 255, 0.45));
        }

        .session-tab-label {
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .session-tab-number {
            width: 1.35rem;
            height: 1.35rem;
            border-radius: 4px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex: 0 0 auto;
            background: rgba(148, 163, 184, 0.16);
            color: var(--t-text-muted);
            font-size: .72rem;
            line-height: 1;
        }

        .session-tab.active .session-tab-number {
            background: var(--tab-color-bg, rgba(0, 217, 255, 0.18));
            color: var(--tab-color, var(--t-accent));
        }

        [data-theme="light"] .session-tab-number {
            background: rgba(15, 23, 42, 0.08);
            color: #475569;
        }

        .session-tab-main {
            border: 0;
            padding: 0;
            background: transparent;
            color: inherit;
            cursor: pointer;
            font: inherit;
            min-width: 0;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .session-tab-close {
            width: 18px;
            height: 18px;
            border: 0;
            border-radius: 4px;
            padding: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            color: currentColor;
            cursor: pointer;
            font-size: 1rem;
            line-height: 1;
            opacity: 0.68;
        }

        .session-tab-close:hover {
            background: rgba(255, 68, 68, 0.18);
            color: #ff7777;
            opacity: 1;
        }

        .topbar-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 0;
        }

        .topbar-icon {
            width: 28px;
            height: 28px;
            flex: 0 0 auto;
        }

        .sessions-menu {
            position: relative;
            display: inline-flex;
            flex: 0 0 auto;
        }

        .sessions-menu-toggle {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            height: 32px;
        }

        .sessions-menu-toggle::after {
            content: "";
            width: 0;
            height: 0;
            border-left: 4px solid transparent;
            border-right: 4px solid transparent;
            border-top: 5px solid currentColor;
        }

        .sessions-menu-panel {
            position: absolute;
            top: calc(100% + 6px);
            left: 0;
            z-index: 50;
            display: none;
            min-width: 190px;
            padding: 6px;
            border: 1px solid var(--t-border-tab);
            border-radius: 6px;
            background: var(--t-ctx-bg);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.32);
        }

        .sessions-menu.open .sessions-menu-panel {
            display: flex;
            flex-direction: column;
        }

        .sessions-menu-item {
            border: 0;
            border-radius: 4px;
            background: transparent;
            color: var(--t-text-secondary);
            cursor: pointer;
            font: inherit;
            font-size: .82rem;
            font-weight: 500;
            padding: 8px 10px;
            text-align: left;
            white-space: nowrap;
        }

        .sessions-menu-item:hover,
        .sessions-menu-item:focus {
            background: var(--t-ctx-hover);
            color: var(--t-text);
            outline: none;
        }

        .sessions-menu-item:disabled {
            cursor: wait;
            opacity: 0.65;
        }

        .topbar-title { font-size: 1rem; color: var(--t-accent); font-weight: 700; }
        .topbar-sub   { font-size: .78rem; color: var(--t-text-muted); margin-left: 10px; }

        .topbar-actions { display: flex; gap: 8px; align-items: center; }

        .btn {
            padding: 6px 14px;
            border: none;
            border-radius: 5px;
            font-size: .82rem;
            cursor: pointer;
            transition: background .2s;
            font-weight: 500;
        }

        .btn-primary  { background: var(--t-accent); color: #000; }
        .btn-primary:hover  { background: var(--t-accent-hover); }
        .btn-success  { background: var(--t-success); color: #fff; }
        .btn-success:hover  { background: var(--t-success-hover); }
        .btn-cyan  { background: var(--t-accent); color: #000; }
        .btn-cyan:hover  { background: var(--t-accent-hover); }
        .btn-danger   { background: #ff4444; color: #fff; }
        .btn-danger:hover   { background: #d43434; }
        .btn-neutral  { background: var(--t-btn-neutral); color: var(--t-btn-neutral-text); }
        .btn-neutral:hover  { background: var(--t-btn-neutral-hover); }
        .btn-icon {
            min-width: 40px;
            padding-left: 10px;
            padding-right: 10px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            line-height: 1;
        }
        .settings-window-btn {
            width: 38px;
            height: 34px;
            min-width: 38px;
            padding: 0;
            border: 1px solid var(--t-border-tab);
            background: var(--t-btn-bg);
        }
        .settings-window-btn:hover {
            border-color: var(--t-accent);
            background: var(--t-btn-hover-bg);
        }
        .topbar-toggle-btn {
            width: 38px;
            min-width: 38px;
            margin: 8px 10px 8px 0;
            padding: 0;
            border: 1px solid var(--t-border-tab);
            border-radius: 5px;
            background: var(--t-btn-bg);
            color: var(--t-btn-text);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background .18s, border-color .18s, color .18s;
        }
        .topbar-toggle-btn:hover {
            border-color: var(--t-accent);
            color: var(--t-accent);
            background: var(--t-btn-hover-bg);
        }
        .topbar-toggle-icon {
            width: 18px;
            height: 18px;
            display: block;
        }
        .surface-mode-btn {
            width: 40px;
            height: 34px;
            min-width: 40px;
            padding: 0;
            border: 1px solid var(--t-border-tab);
            background: var(--t-btn-bg);
        }
        .surface-mode-btn:hover,
        .surface-mode-btn.active {
            border-color: var(--t-accent);
            color: var(--t-accent);
            background: var(--t-btn-hover-bg);
        }
        .surface-mode-icon {
            width: 18px;
            height: 18px;
            display: block;
        }
        .vibe-flow-icon {
            width: 24px;
            height: 24px;
            display: block;
            filter: drop-shadow(0 0 5px rgba(0, 217, 255, 0.32));
        }
        .refresh-all-icon {
            width: 18px;
            height: 18px;
            display: block;
        }

        /* ── Grid area ── */
        #terminalsGrid {
            flex: 1;
            display: grid;
            width: 100%;
            gap: 8px;
            padding: 8px;
            margin: 0 auto;
            overflow: hidden;
        }

        #terminalResizeOverlay {
            position: fixed;
            inset: 0 auto auto 0;
            width: 0;
            height: 0;
            pointer-events: none;
            z-index: 60;
        }

        .terminal-resize-handle {
            position: fixed;
            border-radius: 999px;
            background: transparent;
            border: 1px solid transparent;
            opacity: 0;
            pointer-events: auto;
            touch-action: none;
            transition: opacity .12s ease, background .12s ease, border-color .12s ease;
        }

        .terminal-resize-handle.vertical {
            width: 10px;
            transform: translateX(-5px);
            cursor: col-resize;
        }

        .terminal-resize-handle.horizontal {
            height: 10px;
            transform: translateY(-5px);
            cursor: row-resize;
        }

        .terminal-resize-handle:hover,
        .terminal-resize-handle.active {
            opacity: 1;
            background: color-mix(in srgb, var(--t-accent) 28%, transparent);
            border-color: color-mix(in srgb, var(--t-accent) 70%, transparent);
        }

        body.terminal-grid-resizing,
        body.terminal-grid-resizing * {
            user-select: none !important;
        }

        /* Layout classes */
        #terminalsGrid.layout-2-vertical {
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr;
        }

        #terminalsGrid.layout-single {
            grid-template-columns: 1fr;
            grid-template-rows: 1fr;
        }

        #terminalsGrid.layout-2-horizontal {
            grid-template-columns: 1fr;
            grid-template-rows: 1fr 1fr;
        }

        #terminalsGrid.layout-3-vertical {
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: 1fr;
        }

        #terminalsGrid.layout-3-horizontal {
            grid-template-columns: 1fr;
            grid-template-rows: repeat(3, 1fr);
        }

        #terminalsGrid.layout-3-split {
            grid-template-columns: 2fr 1fr;
            grid-template-rows: 1fr 1fr;
        }

        #terminalsGrid.layout-3-split .terminal-container:nth-child(1) {
            grid-column: 1;
            grid-row: 1;
        }

        #terminalsGrid.layout-3-split .terminal-container:nth-child(2) {
            grid-column: 1;
            grid-row: 2;
        }

        #terminalsGrid.layout-3-split .terminal-container:nth-child(3) {
            grid-column: 2;
            grid-row: 1 / span 2;
        }

        #terminalsGrid.layout-grid {
            grid-template-columns: repeat(var(--grid-columns, 2), 1fr);
            grid-template-rows: repeat(var(--grid-rows, 2), 1fr);
        }

        #terminalsGrid.layout-split-local {
            grid-template-columns: repeat(var(--split-grid-columns, 4), minmax(0, 1fr));
            grid-template-rows: repeat(var(--split-grid-rows, 2), minmax(0, 1fr));
        }

        /* ── Terminal card ── */
        .terminal-container {
            display: flex;
            flex-direction: column;
            background: var(--t-card);
            border-radius: 7px;
            overflow: hidden;
            border: 1px solid var(--t-border-card);
            min-height: 0;
            min-width: 0;
        }

        .terminal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 7px 13px;
            background: var(--t-card-header);
            border-bottom: 1px solid var(--t-border);
            flex-shrink: 0;
            min-width: 0;
        }

        .terminal-header.draggable {
            cursor: grab;
            user-select: none;
        }

        .terminal-header.draggable:active {
            cursor: grabbing;
        }

        .terminal-info { display: flex; align-items: center; gap: 10px; min-width: 0; }
        .terminal-name,
        .terminal-host {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .terminal-name { font-weight: 600; color: var(--t-accent); font-size: .88rem; }
        .terminal-host { color: var(--t-text-muted); font-size: .78rem; }

        .terminal-meta {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .terminal-status { display: flex; align-items: center; gap: 6px; font-size: .78rem; }

        .terminal-action-btn {
            border: 1px solid var(--session-color-dim, var(--t-border-tab));
            background: var(--t-btn-bg);
            color: var(--t-btn-text);
            border-radius: 5px;
            padding: 5px 9px;
            font-size: .73rem;
            font-weight: 600;
            cursor: pointer;
            transition: background .18s, border-color .18s, color .18s;
        }

        .terminal-action-btn:hover:not(:disabled) {

        .explorer-theme-btn {

            background: #1a0808;

        .voice-btn.recording:hover {

        @keyframes voice-pulse {

        .status-dot.connecting  { background: #ffaa00; animation: blink .5s infinite; }
        .status-dot.connected   { background: #00ff88; animation: blink 2s infinite; }
        .status-dot.error       { background: #ff4444; }
        .status-dot.disconnected{ background: #555; }

        @keyframes blink {
            0%, 100% { opacity: 1; }

        .terminal-wrapper {

            overflow: hidden;

        .terminal-container.drag-target {
            border-color: var(--t-accent);

        }

        .terminal-surface {

        }

        .terminal-canvas {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .terminal-canvas .xterm          { height: 100%; }
        .terminal-canvas .xterm-viewport { overflow-y: auto !important; }

        body.topbar-collapsed .topbar {

        body.surface-max .topbar-icon {
            width: 24px;
            height: 24px;
        }

        body.surface-max .sessions-menu-toggle {
            height: 28px;

        body.surface-max .topbar-sub {

            padding: 4px 9px;

        body.surface-max .session-tabs {
            gap: 5px;

        }

        body.surface-max .topbar-toggle-btn {
            width: 30px;
            min-width: 30px;
            margin: 4px 6px 4px 0;
        }

        body.surface-max .session-tab {

            padding: 5px 8px;

        }

        body.surface-max .session-tab-close {

            height: 16px;
        }

        body.surface-max #terminalsGrid {
            gap: 4px;
            padding: 4px;
        }

        body.surface-max .terminal-container {
            border-radius: 3px;
        }

        body.surface-max .terminal-header {
            padding: 4px 7px;
        }

        body.surface-max .terminal-info {
            gap: 7px;
        }

        body.surface-max .terminal-name {
            font-size: .78rem;
        }

        body.surface-max .terminal-host,
        body.surface-max .terminal-status {
            font-size: .68rem;
        }

        body.surface-max .terminal-meta {
            gap: 5px;
        }

        body.surface-max .terminal-action-btn {
            border-radius: 4px;
            padding: 3px 6px;
            font-size: .68rem;
        }

        body.surface-max .terminal-surface {
            padding: 4px 5px 5px;
        }

        .explorer-pane [data-terminal-clear],
        .explorer-pane .voice-control {
            display: none;
        }

        .explorer-surface {
            height: 100%;
            display: grid;
            grid-template-rows: auto minmax(0, 1fr);
            color: var(--explorer-text);
            background: var(--explorer-bg);
            border: 1px solid var(--explorer-border);
            border-radius: 6px;
            overflow: hidden;
        }

        .explorer-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px;
            border-bottom: 1px solid var(--explorer-border);
            background: var(--explorer-bar-bg);
            min-width: 0;
        }

        .explorer-directory-search {
            display: none;
            align-items: center;
            gap: 4px;
            min-width: 170px;
            flex: 0 1 280px;
            margin-left: auto;
        }

        .explorer-directory-search.active {
            display: inline-flex;
        }

        .explorer-up {
            width: 32px;
            height: 28px;
            border: 1px solid var(--t-border-tab);
            border-radius: 5px;
            background: var(--t-btn-bg);
            color: var(--t-btn-text);
            cursor: pointer;
        }

        .explorer-up:disabled {
            opacity: .45;
            cursor: default;
        }

        .explorer-path {
            min-width: 0;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: var(--explorer-muted);
            font-size: .78rem;
            font-family: Consolas, Monaco, 'Courier New', monospace;
        }

        .explorer-git-summary {
            max-width: 42%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: var(--explorer-muted);
            font-size: .72rem;
            font-family: Consolas, Monaco, 'Courier New', monospace;
            flex: 0 1 auto;
        }

        .explorer-list {
            min-height: 0;
            overflow: auto;
            display: grid;
            align-content: start;
        }

        .explorer-list.file-view {
            overflow: hidden;
            align-content: stretch;
        }

        .explorer-row {
            display: grid;
            grid-template-columns: 24px 22px minmax(0, 1fr) minmax(52px, 72px) minmax(92px, 150px);
            gap: 10px;
            align-items: center;
            min-height: 34px;
            padding: 6px 10px;
            border: 0;
            border-bottom: 1px solid var(--explorer-row-border);
            background: transparent;
            color: var(--explorer-muted);
            text-align: left;
            font: inherit;
            cursor: default;
        }

        .explorer-row:disabled {
            opacity: 1;
        }

        .explorer-row.directory,
        .explorer-row.file {
            cursor: pointer;
            color: var(--explorer-text);
        }

        .explorer-row.directory:hover,
        .explorer-row.file:hover {
            background: var(--explorer-row-hover);
        }

        .explorer-row.directory:focus-visible,
        .explorer-row.file:focus-visible {
            outline: 2px solid var(--t-accent);
            outline-offset: -2px;
            background: var(--explorer-row-active);
        }

        .explorer-row.drag-over,
        .explorer-row.move-target {
            background: var(--explorer-row-active);
            box-shadow: inset 0 0 0 1px var(--t-accent);
        }

        .explorer-icon {
            width: 24px;
            height: 24px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: var(--explorer-file);
        }

        .explorer-icon svg {
            width: 20px;
            height: 20px;
            display: block;
        }

        .explorer-icon.folder {
            color: var(--explorer-folder);
        }

        .explorer-icon.file {
            color: var(--explorer-file);
        }

        .explorer-git-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 18px;
            height: 18px;
            border: 1px solid var(--explorer-row-border);
            border-radius: 4px;
            color: var(--t-accent);
            background: var(--explorer-bar-bg);
            font-size: .68rem;
            font-weight: 700;
            font-family: Consolas, Monaco, 'Courier New', monospace;
        }

        .explorer-git-badge.clean {
            visibility: hidden;
        }

        .explorer-git-badge.untracked,
        .explorer-git-badge.ignored {
            color: var(--explorer-muted);
        }

        .explorer-git-badge.conflicted,
        .explorer-git-badge.deleted {
            color: #b91c1c;
        }

        .explorer-pane[data-explorer-theme="dark"] .explorer-git-badge.conflicted,
        .explorer-pane[data-explorer-theme="dark"] .explorer-git-badge.deleted {
            color: #fca5a5;
        }

        .explorer-name {
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: .8rem;
            color: currentColor;
        }

        .explorer-meta {
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--explorer-muted);
            font-size: .72rem;
            white-space: nowrap;
            text-align: right;
        }

        .explorer-message {
            padding: 14px;
            color: var(--explorer-muted);
            font-size: .78rem;
        }

        .explorer-file-open-error {
            border-bottom: 1px solid var(--explorer-row-border);
            color: #b45309;
        }

        .explorer-pane[data-explorer-theme="dark"] .explorer-file-open-error {
            color: #fbbf24;
        }

        .explorer-editor {
            height: 100%;
            min-height: 0;
            display: grid;
            grid-template-rows: auto minmax(0, 1fr);
        }

        .explorer-editor-header {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            min-width: 0;
            padding: 8px 10px;
            border-bottom: 1px solid var(--explorer-row-border);
            background: var(--explorer-bar-bg);
        }

        .explorer-editor-back {
            border: 1px solid var(--t-border-tab);
            border-radius: 5px;
            background: var(--t-btn-bg);
            color: var(--t-btn-text);
            cursor: pointer;
            font-size: .74rem;
            padding: 5px 9px;
        }

        .explorer-editor-title {
            min-width: 0;
            flex: 1 1 150px;
        }

        .explorer-editor-tabs {
            display: inline-flex;
            gap: 4px;
            flex-shrink: 0;
        }

        .explorer-editor-tab {
            border: 1px solid var(--t-border-tab);
            border-radius: 5px;
            background: var(--t-btn-bg);
            color: var(--t-btn-text);
            cursor: pointer;
            font-size: .72rem;
            padding: 5px 8px;
        }

        .explorer-editor-tab[aria-selected="true"],

            border-color: var(--t-accent);
            color: var(--t-accent);
            background: var(--explorer-row-active);
        }

        .explorer-editor-search {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            min-width: 160px;
            flex: 0 1 260px;
        }

        .explorer-editor-zoom {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            flex: 0 0 auto;
        }

        .explorer-search-input {
            min-width: 0;
            width: 100%;
            height: 28px;
            border: 1px solid var(--t-border-tab);
            border-radius: 5px;
            padding: 4px 8px;
            background: var(--explorer-bg);
            color: var(--explorer-text);
            font: inherit;
            font-size: .74rem;
        }

        .explorer-search-input:focus {
            outline: 2px solid var(--t-accent);
            outline-offset: 0;
            border-color: var(--t-accent);
        }

        .explorer-search-count {
            min-width: 42px;
            color: var(--explorer-muted);
            font-size: .7rem;
            text-align: center;
            white-space: nowrap;
        }

        .explorer-search-btn {
            width: 28px;
            height: 28px;
            border: 1px solid var(--t-border-tab);
            border-radius: 5px;
            background: var(--t-btn-bg);
            color: var(--t-btn-text);
            cursor: pointer;
            font-size: .72rem;
            line-height: 1;
            flex: 0 0 auto;
        }

        .explorer-search-btn:disabled {
            opacity: .45;
            cursor: default;
        }

        .explorer-zoom-btn {
            width: 28px;
            height: 28px;
            border: 1px solid var(--t-border-tab);
            border-radius: 5px;
            background: var(--t-btn-bg);
            color: var(--t-btn-text);
            cursor: pointer;
            font-size: .82rem;
            font-weight: 700;
            line-height: 1;
            flex: 0 0 auto;
        }

        .explorer-zoom-btn:disabled {
            opacity: .45;
            cursor: default;
        }

        .explorer-zoom-value {
            min-width: 38px;
            color: var(--explorer-muted);
            font-size: .7rem;
            text-align: center;
            white-space: nowrap;
        }

        .explorer-editor-name {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: var(--explorer-text);
            font-size: .82rem;
            font-weight: 700;
        }

        .explorer-editor-meta {
            margin-top: 2px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: var(--explorer-muted);
            font-size: .7rem;
            font-family: Consolas, Monaco, 'Courier New', monospace;
        }

        .explorer-editor-body {
            min-height: 0;
            overflow: hidden;
            display: grid;
        }

        .explorer-editor-body.split-diff {
            grid-template-columns: minmax(0, 1fr);
        }

        .explorer-editor-main {
            min-width: 0;
            min-height: 0;
            overflow: hidden;
            display: grid;
        }

        .explorer-editor-body.split-diff .explorer-editor-main {
            display: none;
        }

        .explorer-editor-panel {
            min-height: 0;
            overflow: auto;
        }

        .explorer-editor-panel[hidden] {
            display: none;
        }

        .explorer-editor-content {
            min-height: 0;
            margin: 0;
            padding: 12px 14px;
            overflow: auto;
            color: var(--explorer-text);
            background: var(--explorer-bg);
            font-family: Consolas, Monaco, 'Courier New', monospace;
            font-size: var(--explorer-editor-font-size, .78rem);
            line-height: 1.45;
            white-space: pre-wrap;
            overflow-wrap: anywhere;
            word-break: break-word;
            tab-size: 4;
        }

        .explorer-editor-content code {
            white-space: inherit;
            overflow-wrap: inherit;
            word-break: inherit;
        }

        .explorer-diff-content {
            color: var(--explorer-text);
        }

        .explorer-diff-split {
            min-width: 0;
            min-height: 0;
            overflow: auto;
            background: var(--explorer-bg);
        }

        .explorer-diff-split[hidden] {
            display: none;
        }

        .explorer-side-by-side-diff {
            min-width: 720px;
            display: grid;
            align-content: start;
            color: var(--explorer-text);
            font-family: Consolas, Monaco, 'Courier New', monospace;
            font-size: var(--explorer-editor-font-size, .78rem);
            line-height: 1.45;
        }

        .explorer-diff-row {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
            min-height: 22px;
            border-bottom: 1px solid rgba(127, 127, 127, .08);
        }

        .explorer-diff-cell {
            min-width: 0;
            display: grid;
            grid-template-columns: 54px minmax(0, 1fr);
            border-right: 1px solid var(--explorer-row-border);
        }

        .explorer-diff-cell:last-child {
            border-right: 0;
        }

        .explorer-diff-line-number {
            padding: 2px 8px;
            color: var(--explorer-muted);
            text-align: right;
            user-select: none;
            border-right: 1px solid rgba(127, 127, 127, .12);
        }

        .explorer-diff-line-code {
            min-width: 0;
            padding: 2px 10px;
            white-space: pre-wrap;
            overflow-wrap: anywhere;
            word-break: break-word;
        }

        .explorer-diff-cell.add {
            background: rgba(34, 197, 94, .18);
        }

        .explorer-diff-cell.delete {
            background: rgba(239, 68, 68, .18);
        }

        .explorer-diff-cell.empty {
            background:
                repeating-linear-gradient(
                    -45deg,
                    rgba(127, 127, 127, .12),
                    rgba(127, 127, 127, .12) 2px,
                    transparent 2px,
                    transparent 7px
                );
        }

        .explorer-diff-cell.hunk {
            grid-column: 1 / 3;
            grid-template-columns: 1fr;
            padding: 3px 10px;
            color: var(--explorer-muted);
            background: var(--explorer-bar-bg);
            border-right: 0;
            font-weight: 700;
        }

        .explorer-diff-empty {
            padding: 14px;
            color: var(--explorer-muted);
            font-size: .78rem;
        }

        @media (max-width: 900px) {
            .explorer-side-by-side-diff {
                min-width: 620px;
            }

        .explorer-code-keyword {
            color: #7c3aed;
            font-weight: 700;
        }

        .explorer-code-string {
            color: #0f766e;
        }

        .explorer-code-comment {
            color: var(--explorer-muted);
            font-style: italic;
        }

        .explorer-code-number {
            color: #b45309;
        }

        .explorer-code-builtin {
            color: #0369a1;

        }

        .explorer-log-timestamp {
            color: #64748b;
            font-weight: 600;
        }

        .explorer-log-level {

        }

        .explorer-log-level.debug {
            color: #64748b;
        }

        .explorer-log-level.info {
            color: #0369a1;
        }

        .explorer-log-level.warn {
            color: #b45309;
        }

        .explorer-log-level.error {
            color: #b91c1c;
        }

        .explorer-search-match {
            border-radius: 2px;
            padding: 0 1px;
            background: #facc15;
            color: #111827;
        }

        .explorer-search-match.active {
            background: #fb923c;
            color: #111827;
            box-shadow: 0 0 0 1px rgba(17, 24, 39, .3);
        }

        .explorer-pane[data-explorer-theme="dark"] .explorer-code-keyword {
            color: #c4b5fd;
        }

        .explorer-pane[data-explorer-theme="dark"] .explorer-code-string {
            color: #5eead4;
        }

        .explorer-pane[data-explorer-theme="dark"] .explorer-code-number {
            color: #fbbf24;
        }

        .explorer-pane[data-explorer-theme="dark"] .explorer-code-builtin {
            color: #7dd3fc;
        }

        .explorer-pane[data-explorer-theme="dark"] .explorer-log-timestamp,
        .explorer-pane[data-explorer-theme="dark"] .explorer-log-level.trace,
        .explorer-pane[data-explorer-theme="dark"] .explorer-log-level.debug {
            color: #94a3b8;
        }

        .explorer-pane[data-explorer-theme="dark"] .explorer-log-level.info {
            color: #7dd3fc;
        }

        .explorer-pane[data-explorer-theme="dark"] .explorer-log-level.warn {
            color: #fbbf24;
        }

        .explorer-pane[data-explorer-theme="dark"] .explorer-log-level.error {
            color: #fca5a5;
        }

        .explorer-markdown-preview {
            padding: 14px 18px 28px;

            background: var(--explorer-bg);
            font-size: var(--explorer-editor-font-size, .86rem);

        .explorer-markdown-preview code,

            border-radius: 6px;
            background: var(--explorer-bar-bg);
            white-space: pre-wrap;
            overflow-wrap: anywhere;
            word-break: break-word;
        }

        .explorer-markdown-preview pre code {
            border: 0;
            padding: 0;
            background: transparent;
            white-space: inherit;
            overflow-wrap: inherit;
            word-break: inherit;
        }

        .explorer-markdown-preview blockquote {
            border-left: 3px solid var(--explorer-border);
            padding-left: 12px;
            color: var(--explorer-muted);
        }

        .explorer-markdown-preview table {
            width: 100%;
            border-collapse: collapse;
        }

        .explorer-markdown-preview th,
        .explorer-markdown-preview td {
            border: 1px solid var(--explorer-row-border);
            padding: 6px 8px;
            text-align: left;
        }

        /* ── Terminal context menu ── */
        #term-ctx-menu {
            position: fixed;
            z-index: 9999;
            background: var(--t-ctx-bg);
            border: 1px solid var(--t-ctx-border);
            border-radius: 6px;
            padding: 4px 0;
            min-width: 130px;
            box-shadow: 0 4px 18px rgba(0,0,0,.6);
            font-size: .83rem;
        }
        #term-ctx-menu button {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 7px 14px;
            background: none;
            border: none;
            color: var(--t-text);
            text-align: left;
            cursor: pointer;
            gap: 18px;
            white-space: nowrap;
        }
        #term-ctx-menu button:hover { background: var(--t-ctx-hover); }
        #term-ctx-menu button .shortcut { color: var(--t-text-muted); font-size: .76rem; }

        /* placeholder states */
        .placeholder {
            position: absolute;
            inset: 10px 12px 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--t-text-placeholder);
            gap: 10px;
            pointer-events: none;
            font-size: .8rem;
            padding: 20px;
            text-align: center;
        }

        .placeholder svg { opacity: .5; }

        .placeholder.ph-error { color: #ff6b6b; }
        .placeholder.ph-error .spinner { display: none; }

        .spinner {
            width: 26px; height: 26px;
            border: 2px solid var(--t-spinner-track);
            border-top-color: var(--t-accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* empty state (no sessions) */
        #emptyState {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--t-empty-text);
            gap: 14px;
        }

        #emptyState.visible { display: flex; }
        #emptyState a { color: var(--t-accent); text-decoration: none; }
        #emptyState a:hover { text-decoration: underline; }

        @media (max-width: 700px) {
            #terminalsGrid.layout-single,
            #terminalsGrid.layout-2-vertical,
            #terminalsGrid.layout-2-horizontal,
            #terminalsGrid.layout-3-vertical,
            #terminalsGrid.layout-3-horizontal,
            #terminalsGrid.layout-3-split,
            #terminalsGrid.layout-grid {
                grid-template-columns: 1fr;
                grid-template-rows: none;
            }

            #terminalResizeOverlay {
                display: none;
            }

            #terminalsGrid.layout-3-split .terminal-container:nth-child(1) {
                grid-column: auto;
                grid-row: auto;
            }

            #terminalsGrid.layout-3-split .terminal-container:nth-child(2) {
                grid-column: auto;
                grid-row: auto;
            }

            #terminalsGrid.layout-3-split .terminal-container:nth-child(3) {
                grid-column: auto;
                grid-row: auto;
            }

        }
    </style>
</head>

<script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/socket.io-client@4.7.2/dist/socket.io.min.js"></script>
<script>
    /* ── Theme management ── */
    const THEME_STORAGE_KEY = 'gridvibe.theme';
    const SURFACE_MODE_STORAGE_KEY = 'gridvibe.terminalSurfaceMode';
    const TOPBAR_VISIBILITY_STORAGE_KEY = 'gridvibe.terminalTopbarVisibility';
    const DEFAULT_SURFACE_MODE = {{ app_surface_mode|tojson }};

    function normalizeThemePreference(theme) {
        return ['system', 'light', 'dark'].includes(theme) ? theme : 'system';
    }

    function getStoredTheme() {
        try { return normalizeThemePreference(localStorage.getItem(THEME_STORAGE_KEY)); } catch (_) { return null; }
    }

    function getSystemTheme() {
        return window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
    }

    function resolveTheme(theme) {
        const preference = normalizeThemePreference(theme);
        return preference === 'system' ? getSystemTheme() : preference;
    }

    function applyTheme(theme) {
        const preference = normalizeThemePreference(theme);
        const resolved = resolveTheme(preference);
        document.documentElement.setAttribute('data-theme', resolved);
        document.documentElement.setAttribute('data-theme-preference', preference);
        try { localStorage.setItem(THEME_STORAGE_KEY, preference); } catch (_) {}
        const btn = document.getElementById('themeToggleBtn');
        if (btn) {
            btn.textContent =
                preference === 'light' ? '☀️ Light'
                : preference === 'dark' ? '🌙 Dark'
                : '◐ System';
        }
        syncDefaultExplorerThemes();
    }

    function currentResolvedTheme() {
        return document.documentElement.getAttribute('data-theme') || resolveTheme(getStoredTheme() || 'system');
    }

    function cycleTheme() {
        const current = getStoredTheme() || 'system';
        const nextTheme =
            current === 'system' ? 'light'
            : current === 'light' ? 'dark'
            : 'system';
        applyTheme(nextTheme);
    }

    (function initTheme() {
        applyTheme(getStoredTheme() || 'system');
        const mediaQuery = window.matchMedia('(prefers-color-scheme: light)');
        const listener = () => {
            const themePreference = document.documentElement.getAttribute('data-theme-preference') || getStoredTheme() || 'system';
            if (themePreference === 'system') {
                applyTheme('system');
            }
        };
        if (typeof mediaQuery.addEventListener === 'function') {
            mediaQuery.addEventListener('change', listener);
        } else if (typeof mediaQuery.addListener === 'function') {
            mediaQuery.addListener(listener);
        }
    })();

    function normalizeSurfaceMode(mode) {
        return mode === 'max' ? 'max' : 'normal';
    }

    function getStoredSurfaceMode() {
        try {
            return localStorage.getItem(SURFACE_MODE_STORAGE_KEY) === 'max';
        } catch (_) {
            return false;
        }
    }

    function updateSurfaceModeButton(enabled) {
        const button = document.getElementById('surfaceModeBtn');
        if (!button) {
            return;
        }
        const label = enabled ? 'Normal surface' : 'Max surface';
        button.classList.toggle('active', enabled);
        button.title = label;
        button.setAttribute('aria-label', label);
        button.setAttribute('aria-pressed', enabled ? 'true' : 'false');
    }

    async function refitAttachedTerminalsForSurfaceMode() {
        const attachedIndices = terminals
            .map((terminal, index) => terminal?._attached ? index : -1)
            .filter(index => index !== -1);
        await redrawAttachedTerminals(attachedIndices, { forceResize: true });
    }

    function applySurfaceMode(enabled, { persist = false, refit = false } = {}) {
        const active = Boolean(enabled);
        document.body.classList.toggle('surface-max', active);
        updateSurfaceModeButton(active);
        if (persist) {
            try {
                localStorage.setItem(SURFACE_MODE_STORAGE_KEY, active ? 'max' : 'normal');
            } catch (_) {}
        }
        if (refit) {
            refitAttachedTerminalsForSurfaceMode();
        }
    }

    function toggleSurfaceMode() {
        surfaceModeChangedManually = true;
        applySurfaceMode(!document.body.classList.contains('surface-max'), {
            persist: true,
            refit: true
        });
    }

    function applyConfiguredSurfaceMode(data, { refit = false } = {}) {
        if (surfaceModeChangedManually) {
            return;
        }

        const groupId = data?.group?.group_id || activeGroupId || '';
        const mode = normalizeSurfaceMode(data?.surface_mode || DEFAULT_SURFACE_MODE);
        const applyKey = `${data?.group?.created_at || ''}:${mode}`;
        if (groupId && surfaceModeAppliedGroups.get(groupId) === applyKey) {
            return;
        }

        applySurfaceMode(mode === 'max', { refit });
        if (groupId) {
            surfaceModeAppliedGroups.set(groupId, applyKey);
        }
    }

    function getStoredTopbarVisible() {
        try {
            return localStorage.getItem(TOPBAR_VISIBILITY_STORAGE_KEY) !== 'hidden';
        } catch (_) {
            return true;
        }
    }

    function updateTopbarToggleButton(visible) {
        const button = document.getElementById('topbarToggleBtn');
        const path = document.getElementById('topbarTogglePath');
        if (!button) {
            return;
        }
        const label = visible ? 'Hide top bar' : 'Show top bar';
        button.title = label;
        button.setAttribute('aria-label', label);
        button.setAttribute('aria-expanded', visible ? 'true' : 'false');
        if (path) {
            path.setAttribute('d', visible ? 'M6 15l6-6 6 6' : 'M6 9l6 6 6-6');
        }
    }

    function applyTopbarVisibility(visible, { persist = false, refit = false } = {}) {
        const shouldShow = Boolean(visible);
        document.body.classList.toggle('topbar-collapsed', !shouldShow);
        updateTopbarToggleButton(shouldShow);
        if (persist) {
            try {
                localStorage.setItem(
                    TOPBAR_VISIBILITY_STORAGE_KEY,
                    shouldShow ? 'visible' : 'hidden'
                );
            } catch (_) {}
        }
        if (refit) {
            refitAttachedTerminalsForSurfaceMode();
        }
    }

    function toggleTopbarVisibility() {
        applyTopbarVisibility(document.body.classList.contains('topbar-collapsed'), {
            persist: true,
            refit: true
        });
    }

    const EXPLORER_THEME_STORAGE_KEY = 'gridvibe.explorerTheme';

    function normalizeExplorerTheme(theme) {
        return theme === 'dark' ? 'dark' : 'light';
    }

    function getExplorerThemeStore() {
        try {
            const raw = localStorage.getItem(EXPLORER_THEME_STORAGE_KEY);
            if (!raw) {
                return {};
            }
            if (raw === 'light' || raw === 'dark') {
                return {};
            }
            const parsed = JSON.parse(raw);
            return parsed && typeof parsed === 'object' ? parsed : {};
        } catch (_) {
            return {};
        }
    }

    function hasExplorerThemeOverride(key = '') {
        const store = getExplorerThemeStore();
        return Boolean(key && Object.prototype.hasOwnProperty.call(store, key));
    }

    function getExplorerTheme(key = '') {
        const store = getExplorerThemeStore();
        return normalizeExplorerTheme(
            key && Object.prototype.hasOwnProperty.call(store, key)
                ? store[key]
                : 'dark'
        );
    }

    function saveExplorerTheme(key, theme) {
        if (!key) {
            return;
        }
        const store = getExplorerThemeStore();
        store[key] = normalizeExplorerTheme(theme);
        try {
            localStorage.setItem(EXPLORER_THEME_STORAGE_KEY, JSON.stringify(store));
        } catch (_) {
        }
    }

    function explorerThemeLabel(theme) {
        return normalizeExplorerTheme(theme) === 'dark' ? 'Light explorer theme' : 'Dark explorer theme';
    }

    function updateExplorerThemeButton(button, theme) {
        if (!button) {
            return;
        }
        const normalizedTheme = normalizeExplorerTheme(theme);
        button.textContent = normalizedTheme === 'dark' ? '☀' : '☾';
        button.title = explorerThemeLabel(normalizedTheme);
        button.setAttribute('aria-label', explorerThemeLabel(normalizedTheme));
        button.setAttribute('aria-pressed', normalizedTheme === 'dark' ? 'true' : 'false');
    }

    function applyExplorerThemeToCard(card, theme) {
        if (!card) {
            return;
        }
        const normalizedTheme = normalizeExplorerTheme(theme);
        card.dataset.explorerTheme = normalizedTheme;
        const button = card.querySelector('[data-explorer-theme-toggle]');
        updateExplorerThemeButton(button, normalizedTheme);
    }

    function syncDefaultExplorerThemes() {
        document.querySelectorAll('.explorer-pane').forEach(card => {
            if (card.dataset.explorerThemeSource === 'override') {
                return;
            }
            applyExplorerThemeToCard(card, 'dark');
            card.dataset.explorerThemeSource = 'default';
        });
    }

    function toggleExplorerTheme(index) {
        const card = document.getElementById(`tc-${index}`);
        if (!card) {
            return;
        }
        const currentTheme = normalizeExplorerTheme(card.dataset.explorerTheme || 'dark');
        const nextTheme = currentTheme === 'dark' ? 'light' : 'dark';
        applyExplorerThemeToCard(card, nextTheme);
        card.dataset.explorerThemeSource = 'override';
        saveExplorerTheme(card.dataset.explorerThemeKey || '', nextTheme);
    }

    /* ─────────────────────────────────────────────
       State  (socket is initialised AFTER functions
       so that a CDN failure can't kill the whole script)
    ───────────────────────────────────────────── */
    let terminals  = [];
    let sessionIds = [];
    let gridBuilt  = false;
    let _focusedTerminalIndex = -1;
    let socket     = null;   // set at the bottom after all defs
    let resizeObservers = [];
    let cachedGroupViews = new Map();
    let sessionRouteMap = new Map();
    let visibleGroupId = '';
    let nativeFullscreen = false;
    let draggedCard = null;
    let draggedSessionTab = null;
    let draggedSessionTabOriginOrder = [];
    let sessionTabDropHandled = false;
    let suppressSessionTabClickUntil = 0;
    let activeGroupId = new URLSearchParams(window.location.search).get('group') || '';
    let sessionGroups = [];
    let activeLoadToken = 0;
    let knownGroupIds = [];
    let workspaceSaveTargets = new Map();
    let surfaceModeChangedManually = false;
    let surfaceModeAppliedGroups = new Map();
    let pendingSplitRestore = null;
    let pendingModeSwitchSessionIds = new Set();
    const MAX_SPLIT_TERMINALS = Math.min(8, Number({{ max_sessions | tojson }} || 8));
    const MIN_SPLIT_COLS = 8;
    const MIN_SPLIT_ROWS = 8;
    const MIN_RESIZE_SURFACE_RATIO = 1 / 8;
    const SAVED_SESSION_UPDATE_STORAGE_KEY = 'gridvibe.savedSessionUpdated';
    const SAVED_SESSION_BROADCAST_CHANNEL = 'gridvibe.savedSessions';
    let splitSlotRects = null;
    let splitColumnWeights = null;
    let splitRowWeights = null;
    let activeGridResize = null;
    let originalSplitSlotCount = 0;

    function isRecursiveSplitLayout() {
        return originalSplitSlotCount > 0 && originalSplitSlotCount <= 2;
    }

    function getSplitPaneLimit() {
        return isRecursiveSplitLayout()
            ? MAX_SPLIT_TERMINALS
            : Math.min(MAX_SPLIT_TERMINALS, Math.max(1, originalSplitSlotCount) * 2);
    }

    function isExplorerSession(session) {
        return ['ssh', 'wsl'].includes(session?.mode) && session?.startup_mode === 'explorer';
    }

    function isExplorerPaneInstance(terminal) {
        return terminal?._paneType === 'explorer';
    }

    function getSessionApiPath(groupId = activeGroupId) {
        return groupId
            ? `/api/sessions?group=${encodeURIComponent(groupId)}`
            : '/api/sessions';
    }

    function getGroupById(groupId) {
        return sessionGroups.find(group => group.group_id === groupId) || null;
    }

    function setSessionRoute(sessionId, groupId, index) {
        if (!sessionId || !groupId || !Number.isInteger(index)) {
            return;
        }
        sessionRouteMap.set(sessionId, { groupId, index });
    }

    function clearSessionRoutes(ids) {
        (ids || []).forEach(sessionId => {
            if (sessionId) {
                sessionRouteMap.delete(sessionId);
            }
        });
    }

    function resolveSessionTarget(sessionId) {
        if (!sessionId) {
            return null;
        }

        const route = sessionRouteMap.get(sessionId);
        if (!route) {
            return null;
        }

        if (route.groupId === visibleGroupId) {
            const terminal = terminals[route.index];
            if (!terminal) {
                return null;
            }
            return {
                groupId: route.groupId,
                index: route.index,
                terminal,
                active: true
            };
        }

        const cached = cachedGroupViews.get(route.groupId);
        const terminal = cached?.terminals?.[route.index];
        if (!terminal) {
            return null;
        }

        return {
            groupId: route.groupId,
            index: route.index,
            terminal,
            active: false
        };
    }

    function clearFitTimers(targetTerminals = terminals) {
        (targetTerminals || []).forEach(terminal => {
            if (!terminal?._fitTimer) {
                return;
            }
            clearTimeout(terminal._fitTimer);
            terminal._fitTimer = null;
        });
    }

    function disconnectObservers(targetObservers = resizeObservers) {
        (targetObservers || []).forEach(observer => observer.disconnect());
    }

    function disconnectTerminalObserver(index) {
        const terminal = terminals[index];
        const observer = terminal?._resizeObserver;
        if (!observer) {
            return;
        }

        observer.disconnect();
        resizeObservers = resizeObservers.filter(item => item !== observer);
        terminal._resizeObserver = null;
        terminal._resizeObserved = false;
    }

    function observeTerminalResize(index) {
        const terminal = terminals[index];
        if (!terminal || terminal._resizeObserved || !('ResizeObserver' in window)) {
            return;
        }

        const wrapper = document.getElementById(`tw-${index}`);
        if (!wrapper) {
            return;
        }

        const observer = new ResizeObserver(() => {
            scheduleFit(index);
            updateSplitButtonState(index);
            renderResizeHandles();
        });
        observer.observe(wrapper);
        resizeObservers.push(observer);
        terminal._resizeObserved = true;
        terminal._resizeObserver = observer;
    }

    function restoreActiveTerminalObservers() {
        resizeObservers = [];
        terminals.forEach((terminal, index) => {
            if (!terminal) {
                return;
            }
            terminal._resizeObserved = false;
            if (terminal._attached) {
                observeTerminalResize(index);
            }
        });
    }

    function captureTerminalViewportState(terminal) {
        const buffer = terminal?.term?.buffer?.active;
        if (!buffer) {
            return null;
        }

        const viewportY = Number(buffer.viewportY || 0);
        const baseY = Number(buffer.baseY || 0);
        return {
            viewportY,
            baseY,
            wasAtBottom: viewportY >= baseY
        };
    }

    function restoreTerminalViewportState(terminal, state) {
        if (!terminal?.term || !state || state.wasAtBottom) {
            return;
        }

        const applyScroll = () => {
            const buffer = terminal.term?.buffer?.active;
            if (!buffer || typeof terminal.term.scrollToLine !== 'function') {
                return;
            }
            terminal.term.scrollToLine(Math.min(Number(state.viewportY || 0), Number(buffer.baseY || 0)));
        };

        applyScroll();
        requestAnimationFrame(() => {
            applyScroll();
            requestAnimationFrame(applyScroll);
        });
        window.setTimeout(applyScroll, 80);
    }

    function captureCachedPaneUiState() {
        terminals.forEach((terminal, index) => {
            if (!terminal) {
                return;
            }
            terminal._cachedTerminalViewport = captureTerminalViewportState(terminal);
            terminal._cachedExplorerScroll = isExplorerPaneInstance(terminal)
                ? captureExplorerFileScroll(index)
                : null;
        });
    }

    function restoreCachedPaneUiState() {
        terminals.forEach((terminal, index) => {
            if (!terminal) {
                return;
            }
            restoreTerminalViewportState(terminal, terminal._cachedTerminalViewport);
            if (isExplorerPaneInstance(terminal)) {
                restoreExplorerFileScroll(index, terminal._cachedExplorerScroll);
            }
            terminal._cachedTerminalViewport = null;
            terminal._cachedExplorerScroll = null;
        });
    }

    function updateSessionChrome(count, groupId = activeGroupId) {
        const activeGroup = getGroupById(groupId);
        const labelParts = [
            activeGroup?.name || 'Session',
            `${count} terminal${count !== 1 ? 's' : ''}`,
            activeGroup?.connection_mode === 'wsl' ? 'Local Repo' : 'SSH'
        ].filter(Boolean);
        document.getElementById('sessionLabel').textContent = labelParts.join(' • ');
        document.title = activeGroup?.name
            ? `GridVibe — ${activeGroup.name}`
            : 'GridVibe — Terminals';
    }

    function cacheVisibleGroupView(groupId = visibleGroupId) {
        if (!groupId || !gridBuilt) {
            return;
        }

        _stopAllVoice();
        const grid = document.getElementById('terminalsGrid');
        const fragment = document.createDocumentFragment();

        clearActiveGridResize();
        clearResizeHandles();
        captureCachedPaneUiState();
        clearFitTimers(terminals);
        disconnectObservers(resizeObservers);
        terminals.forEach(terminal => {
            if (!terminal) {
                return;
            }
            terminal._resizeObserved = false;
            terminal._fitReady = false;
        });

        while (grid.firstChild) {
            fragment.appendChild(grid.firstChild);
        }

        const hasLocalSplitLayout = grid.className === 'layout-split-local';
        cachedGroupViews.set(groupId, {
            groupId,
            terminals,
            sessionIds,
            fragment,
            className: grid.className,
            gridColumns: grid.style.getPropertyValue('--grid-columns'),
            gridRows: grid.style.getPropertyValue('--grid-rows'),
            splitGridColumns: grid.style.getPropertyValue('--split-grid-columns'),
            splitGridRows: grid.style.getPropertyValue('--split-grid-rows'),
            splitSlotRects: hasLocalSplitLayout ? cloneSplitSlotRects() : null,
            splitColumnWeights: hasLocalSplitLayout ? cloneSplitTrackWeights(splitColumnWeights) : null,
            splitRowWeights: hasLocalSplitLayout ? cloneSplitTrackWeights(splitRowWeights) : null,
            originalSplitSlotCount
        });

        terminals = [];
        sessionIds = [];
        resizeObservers = [];
        gridBuilt = false;
        visibleGroupId = '';
        grid.className = '';
        grid.style.removeProperty('--grid-columns');
        grid.style.removeProperty('--grid-rows');
        grid.style.removeProperty('--split-grid-columns');
        grid.style.removeProperty('--split-grid-rows');
        grid.style.gridTemplateColumns = '';
        grid.style.gridTemplateRows = '';
        splitSlotRects = null;
        splitColumnWeights = null;
        splitRowWeights = null;
        originalSplitSlotCount = 0;
    }

    function restoreCachedGroupView(groupId) {
        const cached = cachedGroupViews.get(groupId);
        if (!cached) {
            return false;
        }

        const grid = document.getElementById('terminalsGrid');
        grid.innerHTML = '';
        grid.className = cached.className || '';
        if (cached.gridColumns) {
            grid.style.setProperty('--grid-columns', cached.gridColumns);
        } else {
            grid.style.removeProperty('--grid-columns');
        }
        if (cached.gridRows) {
            grid.style.setProperty('--grid-rows', cached.gridRows);
        } else {
            grid.style.removeProperty('--grid-rows');
        }
        if (cached.splitGridColumns) {
            grid.style.setProperty('--split-grid-columns', cached.splitGridColumns);
        } else {
            grid.style.removeProperty('--split-grid-columns');
        }
        if (cached.splitGridRows) {
            grid.style.setProperty('--split-grid-rows', cached.splitGridRows);
        } else {
            grid.style.removeProperty('--split-grid-rows');
        }
        grid.appendChild(cached.fragment);
        grid.style.display = '';

        terminals = cached.terminals || [];
        sessionIds = cached.sessionIds || [];
        splitSlotRects = cached.className === 'layout-split-local'
            ? cloneSplitSlotRects(cached.splitSlotRects)
            : null;
        splitColumnWeights = cached.className === 'layout-split-local'
            ? cloneSplitTrackWeights(cached.splitColumnWeights)
            : null;
        splitRowWeights = cached.className === 'layout-split-local'
            ? cloneSplitTrackWeights(cached.splitRowWeights)
            : null;
        originalSplitSlotCount = Number(cached.originalSplitSlotCount || terminals.length || 0);
        visibleGroupId = groupId;
        gridBuilt = terminals.length > 0;
        terminals.forEach(terminal => {
            if (terminal) {
                terminal._fitReady = false;
                terminal._resizeObserved = false;
            }
        });
        if (splitSlotRects) {
            applySplitSlotGeometry({ fit: false });
        } else {
            renderResizeHandles();
        }
        restoreCachedPaneUiState();
        restoreActiveTerminalObservers();
        document.getElementById('emptyState').classList.remove('visible');
        return true;
    }

    function dropCachedGroupView(groupId) {
        const cached = cachedGroupViews.get(groupId);
        if (!cached) {
            return;
        }

        clearFitTimers(cached.terminals || []);
        disconnectObservers(cached.resizeObservers || []);
        if (socket) {
            (cached.sessionIds || []).forEach(sessionId => {
                if (sessionId) {
                    socket.emit('leave_session', { session_id: sessionId });
                }
            });
        }
        clearSessionRoutes(cached.sessionIds || []);
        (cached.terminals || []).forEach(terminal => {
            if (terminal?.term) {
                try { terminal.term.dispose(); } catch (_) {}
            }
        });
        cachedGroupViews.delete(groupId);
    }

    function syncLocationToGroup(groupId) {
        const url = new URL(window.location.href);
        if (groupId) {
            url.searchParams.set('group', groupId);
        } else {
            url.searchParams.delete('group');
        }
        window.history.replaceState({}, '', url);
    }

    const TAB_COLOUR_PALETTE = [
        '#ff6b6b', '#ff922b', '#ffd43b', '#69db7c',
        '#38d9a9', '#4dabf7', '#748ffc', '#da77f2',
        '#f783ac', '#a9e34b',
    ];

    function tabColourForGroup(groupId) {
        let hash = 0;
        for (let i = 0; i < groupId.length; i++) {
            hash = (hash * 31 + groupId.charCodeAt(i)) & 0xffffffff;
        }
        return TAB_COLOUR_PALETTE[Math.abs(hash) % TAB_COLOUR_PALETTE.length];
    }

    function hexToRgba(hex, alpha) {
        const r = parseInt(hex.slice(1, 3), 16);
        const g = parseInt(hex.slice(3, 5), 16);
        const b = parseInt(hex.slice(5, 7), 16);
        return `rgba(${r},${g},${b},${alpha})`;
    }

    function applyTabColour(button, groupId) {
        const colour = tabColourForGroup(groupId);
        button.style.setProperty('--tab-color', colour);
        button.style.setProperty('--tab-color-bg', hexToRgba(colour, 0.14));
        button.style.setProperty('--tab-color-shadow', hexToRgba(colour, 0.45));
        button.style.borderColor = hexToRgba(colour, 0.4);
    }

    function savedSessionIdFromGroupId(groupId) {
        const prefix = 'saved-session-';
        const value = String(groupId || '');
        return value.startsWith(prefix) ? value.slice(prefix.length) : '';
    }

    function getWorkspaceSaveTarget(groupId = activeGroupId) {
        const override = workspaceSaveTargets.get(groupId);
        if (override?.id) {
            return override;
        }

        const savedSessionId = savedSessionIdFromGroupId(groupId);
        const group = getGroupById(groupId);
        return {
            id: savedSessionId,
            name: group?.name || ''
        };
    }

    function rememberWorkspaceSaveTarget(groupId, savedSessionId, sessionName) {
        const targetId = String(savedSessionId || '').trim();
        const targetName = String(sessionName || '').trim();
        if (!groupId || !targetId) {
            return;
        }

        workspaceSaveTargets.set(groupId, {
            id: targetId,
            name: targetName
        });

        const group = getGroupById(groupId);
        if (group && targetName) {
            group.name = targetName;
            renderSessionTabs();
            updateSessionChrome(getWorkspacePanesInVisualOrder(groupId).length, groupId);
        }
    }

    function notifySavedSessionUpdated(savedSession) {
        const sessionId = String(savedSession?.id || '').trim();
        if (!sessionId) {
            return;
        }

        const payload = {
            id: sessionId,
            name: String(savedSession?.name || '').trim(),
            updated_at: String(savedSession?.updated_at || '').trim(),
            timestamp: Date.now(),
            nonce: Math.random().toString(36).slice(2)
        };

        try {
            const channel = new BroadcastChannel(SAVED_SESSION_BROADCAST_CHANNEL);
            channel.postMessage(payload);
            channel.close();
        } catch (_error) {}

        try {
            localStorage.setItem(SAVED_SESSION_UPDATE_STORAGE_KEY, JSON.stringify(payload));
        } catch (_error) {}
    }

    function closeSessionsMenu() {
        const root = document.getElementById('sessionsMenuRoot');
        const button = document.getElementById('sessionsMenuBtn');
        root?.classList.remove('open');
        button?.setAttribute('aria-expanded', 'false');
    }

    function toggleSessionsMenu(event) {
        event?.preventDefault();
        event?.stopPropagation();
        const root = document.getElementById('sessionsMenuRoot');
        const button = document.getElementById('sessionsMenuBtn');
        if (!root || !button) {
            return;
        }

        const shouldOpen = !root.classList.contains('open');
        root.classList.toggle('open', shouldOpen);
        button.setAttribute('aria-expanded', shouldOpen ? 'true' : 'false');
    }

    document.addEventListener('click', event => {
        if (!(event.target instanceof Element) || !event.target.closest('#sessionsMenuRoot')) {
            closeSessionsMenu();
        }
    });

    document.addEventListener('keydown', event => {
        if (event.key === 'Escape') {
            closeSessionsMenu();
        }
    });

    function setWorkspaceSaveMessage(message, type = '') {
        const label = document.getElementById('sessionLabel');
        if (!label || !message) {
            return;
        }
        label.textContent = message;
        label.dataset.workspaceSaveStatus = type;
    }

    function buildWorkspaceLayoutSnapshotFromState(count, className, rects, columnWeights, rowWeights, baseCount) {
        if (!count || !Array.isArray(rects) || rects.length !== count) {
            return null;
        }

        return {
            class_name: 'layout-split-local',
            split_slot_rects: rects.map((rect, index) => ({
                originSlot: Number.isInteger(Number(rect.originSlot)) ? Number(rect.originSlot) : index,
                x: Math.max(1, Number(rect.x) || 1),
                y: Math.max(1, Number(rect.y) || 1),
                w: Math.max(1, Number(rect.w) || 1),
                h: Math.max(1, Number(rect.h) || 1)
            })),
            split_column_weights: cloneSplitTrackWeights(columnWeights),
            split_row_weights: cloneSplitTrackWeights(rowWeights),
            original_split_slot_count: Math.max(1, Number(baseCount || count) || count)
        };
    }

    function buildActiveWorkspaceLayoutSnapshot() {
        if (!activeGroupId) {
            return null;
        }

        if (visibleGroupId === activeGroupId && gridBuilt) {
            const grid = document.getElementById('terminalsGrid');
            const rects = cloneSplitSlotRects(
                grid?.className === 'layout-split-local'
                    ? ensureSplitSlotRects()
                    : fixedLayoutSlotRects(terminals.length, grid?.className || '')
            );
            const size = getSplitGridSize(rects);
            return buildWorkspaceLayoutSnapshotFromState(
                terminals.length,
                grid?.className || '',
                rects,
                normalizeSplitTrackWeights(splitColumnWeights, size.columns),
                normalizeSplitTrackWeights(splitRowWeights, size.rows),
                originalSplitSlotCount || terminals.length
            );
        }

        const cached = cachedGroupViews.get(activeGroupId);
        if (!cached) {
            return null;
        }

        return buildWorkspaceLayoutSnapshotFromState(
            cached.terminals?.length || 0,
            cached.className || '',
            cached.splitSlotRects,
            cached.splitColumnWeights,
            cached.splitRowWeights,
            cached.originalSplitSlotCount || cached.terminals?.length || 0
        );
    }

    function getWorkspacePanesInVisualOrder(groupId = activeGroupId) {
        if (!groupId) {
            return [];
        }

        if (visibleGroupId === groupId && gridBuilt) {
            const grid = document.getElementById('terminalsGrid');
            const cards = Array.from(grid?.children || []);
            if (cards.length) {
                return cards
                    .map(card => terminals[Number(card.dataset.slot)])
                    .filter(Boolean);
            }
            return terminals.filter(Boolean);
        }

        const cached = cachedGroupViews.get(groupId);
        if (!cached) {
            return [];
        }

        const cachedTerminals = cached.terminals || [];
        const cachedCards = Array.from(cached.fragment?.children || []);
        if (cachedCards.length) {
            return cachedCards
                .map(card => cachedTerminals[Number(card.dataset.slot)])
                .filter(Boolean);
        }
        return cachedTerminals.filter(Boolean);
    }

    function buildWorkspaceTerminalEntry(terminal, index, connectionMode) {
        const session = terminal?._session || {};
        const rawStartupMode = String(session.startup_mode || '').trim();
        const startupMode = isExplorerPaneInstance(terminal) || isExplorerSession(session)
            ? 'explorer'
            : (rawStartupMode === 'agent' ? 'agent' : 'terminal');
        const commandMode = startupMode === 'agent'
            ? 'agent'
            : (startupMode === 'explorer' ? 'explorer' : 'command');
        const selectedDirectory = startupMode === 'explorer'
            ? (terminal?._explorerPath || session.directory || session.explorer_root_directory || '')
            : (session.directory || '');

        return {
            title: session.title || `Terminal ${index + 1}`,
            directory: selectedDirectory,
            initial_command: startupMode === 'explorer' ? '' : (session.initial_command || ''),
            initial_command_mode: commandMode,
            startup_mode: startupMode,
            agent_selection: commandMode === 'agent' ? (session.agent_selection || '') : '',
            custom_agent: commandMode === 'agent' ? (session.custom_agent || '') : '',
            distribution: connectionMode === 'wsl' ? (session.distribution || '') : '',
            use_wsl: connectionMode === 'wsl' ? Boolean(session.use_wsl) : false,
