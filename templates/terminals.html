<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GridVibe — Terminals</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css">
    <style>
        :root {
            --t-bg: #0d0d0d;
            --t-topbar: #161616;
            --t-tabs-bg: #121212;
            --t-card: #141414;
            --t-card-header: #1e1e1e;
            --t-terminal-bg: #0d0d0d;
            --t-border: #2a2a2a;
            --t-border-dim: #232323;
            --t-border-card: #272727;
            --t-border-tab: #2d2d2d;
            --t-text: #e0e0e0;
            --t-text-secondary: #bdbdbd;
            --t-text-muted: #555;
            --t-text-placeholder: #666;
            --t-accent: #00d9ff;
            --t-accent-hover: #00b8d9;
            --t-success: #18b66a;
            --t-success-hover: #14955a;
            --t-btn-bg: #181818;
            --t-btn-text: #cfcfcf;
            --t-btn-hover-bg: #202020;
            --t-btn-neutral: #2c2c2c;
            --t-btn-neutral-text: #ccc;
            --t-btn-neutral-hover: #3a3a3a;
            --t-ctx-bg: #1e1e1e;
            --t-ctx-border: #333;
            --t-ctx-hover: #2a2a2a;
            --t-spinner-track: #2a2a2a;
            --t-empty-text: #444;
            --t-voice-bg: #12161b;
            --t-voice-border: #2a3741;
            --t-voice-input-bg: #0d1115;
            --t-voice-input-text: #e7edf4;
            --t-voice-title: #f4f7fb;
            --t-voice-meta: #8294a8;
            --t-voice-label: #9fb2c4;
            --t-voice-badge-bg: #15202b;
            --t-voice-badge-border: #2e4050;
            --t-voice-badge-text: #9ec4ff;
            --t-voice-toggle-bg: #2a3741;
            --t-voice-toggle-knob: #e7edf4;
            --t-voice-status-bg: #101820;
            --t-voice-status-border: #22303a;
            --t-voice-status-text: #c5d7e6;
            --t-voice-details-bg: #0d1318;
            --t-voice-details-border: #22303a;
            --t-voice-details-title: #dce8f4;
            --t-voice-diag-title: #91a5b9;
            --t-voice-pre-bg: #081018;
            --t-voice-pre-border: #15212b;
            --t-voice-pre-text: #b9d0e3;
            --t-voice-partial-bg: #1a1a2e;
            --t-voice-partial-border: #333;
            --t-voice-partial-text: #8888aa;
        }

        [data-theme="light"] {
            --t-bg: #f0f2f5;
            --t-topbar: #ffffff;
            --t-tabs-bg: #f8f9fa;
            --t-card: #ffffff;
            --t-card-header: #f3f4f6;
            --t-terminal-bg: #0d0d0d;
            --t-border: #d1d5db;
            --t-border-dim: #e5e7eb;
            --t-border-card: #d1d5db;
            --t-border-tab: #d1d5db;
            --t-text: #1a1a2e;
            --t-text-secondary: #374151;
            --t-text-muted: #6b7280;
            --t-text-placeholder: #9ca3af;
            --t-accent: #0891b2;
            --t-accent-hover: #0e7490;
            --t-success: #10b981;
            --t-success-hover: #059669;
            --t-btn-bg: #f3f4f6;
            --t-btn-text: #374151;
            --t-btn-hover-bg: #e5e7eb;
            --t-btn-neutral: #f3f4f6;
            --t-btn-neutral-text: #374151;
            --t-btn-neutral-hover: #e5e7eb;
            --t-ctx-bg: #ffffff;
            --t-ctx-border: #d1d5db;
            --t-ctx-hover: #f3f4f6;
            --t-spinner-track: #d1d5db;
            --t-empty-text: #9ca3af;
            --t-voice-bg: #ffffff;
            --t-voice-border: #d1d5db;
            --t-voice-input-bg: #f9fafb;
            --t-voice-input-text: #1f2937;
            --t-voice-title: #111827;
            --t-voice-meta: #6b7280;
            --t-voice-label: #4b5563;
            --t-voice-badge-bg: #eff6ff;
            --t-voice-badge-border: #bfdbfe;
            --t-voice-badge-text: #1d4ed8;
            --t-voice-toggle-bg: #d1d5db;
            --t-voice-toggle-knob: #ffffff;
            --t-voice-status-bg: #f9fafb;
            --t-voice-status-border: #e5e7eb;
            --t-voice-status-text: #374151;
            --t-voice-details-bg: #f9fafb;
            --t-voice-details-border: #e5e7eb;
            --t-voice-details-title: #1f2937;
            --t-voice-diag-title: #6b7280;
            --t-voice-pre-bg: #f3f4f6;
            --t-voice-pre-border: #e5e7eb;
            --t-voice-pre-text: #374151;
            --t-voice-partial-bg: #ffffff;
            --t-voice-partial-border: #d1d5db;
            --t-voice-partial-text: #6b7280;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--t-bg);
            min-height: 100vh;
            color: var(--t-text);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* ── Top bar ── */
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 18px;
            background: var(--t-topbar);
            border-bottom: 1px solid var(--t-border);
            flex-shrink: 0;
            height: 50px;
        }

        .session-tabs {
            display: flex;
            gap: 8px;
            align-items: center;
            padding: 10px 18px 8px;
            background: var(--t-tabs-bg);
            border-bottom: 1px solid var(--t-border-dim);
            overflow-x: auto;
            flex-shrink: 0;
        }

        .session-tab {
            border: 1px solid var(--t-border-tab);
            background: var(--t-card);
            color: var(--t-text-secondary);
            border-radius: 9px;
            padding: 8px 12px;
            font-size: .8rem;
            cursor: pointer;
            white-space: nowrap;
            transition: background .18s, border-color .18s, color .18s;
        }

        .session-tab.draggable {
            user-select: none;
        }

        .session-tab:hover {
            border-color: var(--tab-color, var(--t-accent));
            color: var(--t-text);
        }

        .session-tab.active {
            background: var(--tab-color-bg, rgba(0, 217, 255, 0.14));
            border-color: var(--tab-color, var(--t-accent));
            color: var(--tab-color, var(--t-accent));
        }

        .session-tab.settings {
            background: rgba(0, 196, 110, 0.16);
            border-color: #00c46e;
            color: #7ef0b4;
        }

        .session-tab.settings:hover {
            background: rgba(0, 196, 110, 0.24);
            border-color: #1add88;
            color: #cffff0;
        }

        .session-tab.dragging {
            opacity: 0.45;
        }

        .session-tab.drag-target {
            border-color: var(--tab-color, var(--t-accent));
            box-shadow: inset 0 0 0 1px var(--tab-color-shadow, rgba(0, 217, 255, 0.45));
        }

        .topbar-title { font-size: 1rem; color: var(--t-accent); font-weight: 600; }
        .topbar-sub   { font-size: .78rem; color: var(--t-text-muted); margin-left: 10px; }

        .topbar-actions { display: flex; gap: 8px; align-items: center; }

        .btn {
            padding: 6px 14px;
            border: none;
            border-radius: 5px;
            font-size: .82rem;
            cursor: pointer;
            transition: background .2s;
            font-weight: 500;
        }

        .btn-primary  { background: var(--t-accent); color: #000; }
        .btn-primary:hover  { background: var(--t-accent-hover); }
        .btn-success  { background: var(--t-success); color: #fff; }
        .btn-success:hover  { background: var(--t-success-hover); }
        .btn-cyan  { background: var(--t-accent); color: #000; }
        .btn-cyan:hover  { background: var(--t-accent-hover); }
        .btn-danger   { background: #ff4444; color: #fff; }
        .btn-danger:hover   { background: #d43434; }
        .btn-neutral  { background: var(--t-btn-neutral); color: var(--t-btn-neutral-text); }
        .btn-neutral:hover  { background: var(--t-btn-neutral-hover); }
        .btn-icon {
            min-width: 40px;
            padding-left: 10px;
            padding-right: 10px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            line-height: 1;
        }
        .settings-window-btn {
            width: 38px;
            height: 34px;
            min-width: 38px;
            padding: 0;
            border: 1px solid var(--t-border-tab);
            background: var(--t-btn-bg);
        }
        .settings-window-btn:hover {
            border-color: var(--t-accent);
            background: var(--t-btn-hover-bg);
        }
        .vibe-flow-icon {
            width: 24px;
            height: 24px;
            display: block;
            filter: drop-shadow(0 0 5px rgba(0, 217, 255, 0.32));
        }

        /* ── Grid area ── */
        #terminalsGrid {
            flex: 1;
            display: grid;
            width: min(1800px, 100%);
            gap: 10px;
            padding: 10px;
            margin: 0 auto;
            overflow: hidden;
        }

        /* Layout classes */
        #terminalsGrid.layout-2-vertical {
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr;
        }

        #terminalsGrid.layout-single {
            grid-template-columns: 1fr;
            grid-template-rows: 1fr;
        }

        #terminalsGrid.layout-2-horizontal {
            grid-template-columns: 1fr;
            grid-template-rows: 1fr 1fr;
        }

        #terminalsGrid.layout-3-vertical {
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: 1fr;
        }

        #terminalsGrid.layout-3-horizontal {
            grid-template-columns: 1fr;
            grid-template-rows: repeat(3, 1fr);
        }

        #terminalsGrid.layout-3-split {
            grid-template-columns: 2fr 1fr;
            grid-template-rows: 1fr 1fr;
        }

        #terminalsGrid.layout-3-split .terminal-container:nth-child(1) {
            grid-column: 1;
            grid-row: 1;
        }

        #terminalsGrid.layout-3-split .terminal-container:nth-child(2) {
            grid-column: 1;
            grid-row: 2;
        }

        #terminalsGrid.layout-3-split .terminal-container:nth-child(3) {
            grid-column: 2;
            grid-row: 1 / span 2;
        }

        #terminalsGrid.layout-grid {
            grid-template-columns: repeat(var(--grid-columns, 2), 1fr);
            grid-template-rows: repeat(var(--grid-rows, 2), 1fr);
        }

        /* ── Terminal card ── */
        .terminal-container {
            display: flex;
            flex-direction: column;
            background: var(--t-card);
            border-radius: 7px;
            overflow: hidden;
            border: 1px solid var(--t-border-card);
            min-height: 0;
            min-width: 0;
        }

        .terminal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 7px 13px;
            background: var(--t-card-header);
            border-bottom: 1px solid var(--t-border);
            flex-shrink: 0;
            min-width: 0;
        }

        .terminal-header.draggable {
            cursor: grab;
            user-select: none;
        }

        .terminal-header.draggable:active {
            cursor: grabbing;
        }

        .terminal-info { display: flex; align-items: center; gap: 10px; min-width: 0; }
        .terminal-name,
        .terminal-host {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .terminal-name { font-weight: 600; color: var(--t-accent); font-size: .88rem; }
        .terminal-host { color: var(--t-text-muted); font-size: .78rem; }

        .terminal-meta {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .terminal-status { display: flex; align-items: center; gap: 6px; font-size: .78rem; }

        .terminal-action-btn {
            border: 1px solid var(--session-color-dim, var(--t-border-tab));
            background: var(--t-btn-bg);
            color: var(--t-btn-text);
            border-radius: 5px;
            padding: 5px 9px;
            font-size: .73rem;
            font-weight: 600;
            cursor: pointer;
            transition: background .18s, border-color .18s, color .18s;
        }

        .terminal-action-btn:hover:not(:disabled) {
            border-color: var(--session-color, var(--t-accent));
            color: var(--t-text);
            background: var(--t-btn-hover-bg);
        }

        .terminal-action-btn:disabled {
            opacity: .55;
            cursor: wait;
        }

        /* ── Voice input ── */
        .voice-control {
            position: relative;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }
        .voice-btn {
            position: relative;
            transition: border-color .18s, color .18s, box-shadow .3s;
        }
        .voice-settings-btn {
            min-width: 42px;
            padding-left: 8px;
            padding-right: 8px;
        }
        .voice-btn.recording {
            border-color: #ff4444;
            color: #ff4444;
            background: #1a0808;
            animation: voice-pulse 1.2s ease-in-out infinite;
        }
        .voice-btn.recording:hover {
            border-color: #ff6666;
            color: #ff6666;
        }
        @keyframes voice-pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255,68,68,0.35); }
            50%      { box-shadow: 0 0 0 4px rgba(255,68,68,0); }
        }
        .terminal-shortcut-btn {
            min-width: 56px;
            text-align: center;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .voice-partial-preview {
            position: absolute;
            bottom: calc(100% + 6px);
            right: 0;
            background: var(--t-voice-partial-bg);
            border: 1px solid var(--t-voice-partial-border);
            border-radius: 5px;
            padding: 3px 10px;
            font-size: .68rem;
            color: var(--t-voice-partial-text);
            white-space: nowrap;
            max-width: 220px;
            overflow: hidden;
            text-overflow: ellipsis;
            pointer-events: none;
            z-index: 5;
        }
        .voice-panel {
            position: absolute;
            top: calc(100% + 8px);
            right: 0;
            width: min(420px, calc(100vw - 36px));
            background: var(--t-voice-bg);
            border: 1px solid var(--t-voice-border);
            border-radius: 10px;
            box-shadow: 0 16px 36px rgba(0, 0, 0, 0.45);
            padding: 12px;
            display: none;
            z-index: 60;
        }
        .voice-panel.open {
            display: block;
        }
        .voice-panel-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
        }
        .voice-panel-title {
            font-size: .82rem;
            font-weight: 700;
            color: var(--t-voice-title);
        }
        .voice-panel-meta {
            margin-top: 3px;
            font-size: .66rem;
            line-height: 1.45;
            color: var(--t-voice-meta);
        }
        .voice-panel-badge {
            border: 1px solid var(--t-voice-badge-border);
            border-radius: 999px;
            padding: 2px 8px;
            font-size: .62rem;
            font-weight: 700;
            color: var(--t-voice-badge-text);
            background: var(--t-voice-badge-bg);
            white-space: nowrap;
        }
        .voice-panel-badge.recording {
            border-color: rgba(255, 85, 85, 0.42);
            color: #ff8a8a;
            background: rgba(70, 18, 18, 0.92);
        }
        .voice-panel-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
        }
        .voice-panel-label {
            width: 78px;
            flex-shrink: 0;
            font-size: .71rem;
            font-weight: 600;
            color: var(--t-voice-label);
        }
        .voice-panel select {
            flex: 1;
            min-width: 0;
            border: 1px solid var(--t-voice-border);
            background: var(--t-voice-input-bg);
            color: var(--t-voice-input-text);
            border-radius: 6px;
            padding: 6px 8px;
            font-size: .72rem;
        }
        .voice-panel select:focus {
            outline: none;
            border-color: var(--t-accent);
            box-shadow: 0 0 0 2px rgba(0, 217, 255, 0.15);
        }
        .voice-panel-toggle {
            position: relative;
            width: 36px;
            height: 20px;
            background: var(--t-voice-toggle-bg);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: background .2s;
            flex-shrink: 0;
            padding: 0;
        }
        .voice-panel-toggle::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 16px;
            height: 16px;
            background: var(--t-voice-toggle-knob);
            border-radius: 50%;
            transition: transform .2s;
        }
        .voice-panel-toggle.active {
            background: var(--t-accent);
        }
        .voice-panel-toggle.active::after {
            transform: translateX(16px);
        }
        .voice-ptt-keybind {
            flex: 1;
            min-width: 0;
            border: 1px solid var(--t-voice-border);
            background: var(--t-voice-input-bg);
            color: var(--t-voice-input-text);
            border-radius: 6px;
            padding: 6px 8px;
            font-size: .72rem;
            cursor: pointer;
            text-align: center;
            user-select: none;
        }
        .voice-ptt-keybind:focus {
            outline: none;
            border-color: #ffaa00;
            box-shadow: 0 0 0 2px rgba(255, 170, 0, 0.15);
            color: #ffaa00;
        }
        .voice-ptt-row {
            display: none;
        }
        .voice-ptt-row.visible {
            display: flex;
        }
        .voice-panel-status {
            margin-top: 10px;
            border: 1px solid var(--t-voice-status-border);
            background: var(--t-voice-status-bg);
            color: var(--t-voice-status-text);
            border-radius: 7px;
            padding: 9px 10px;
            font-size: .7rem;
            line-height: 1.45;
        }
        .voice-panel-section {
            margin-top: 10px;
        }
        .voice-panel details {
            border: 1px solid var(--t-voice-details-border);
            border-radius: 7px;
            background: var(--t-voice-details-bg);
            padding: 8px 10px;
        }
        .voice-panel details + details {
            margin-top: 8px;
        }
        .voice-panel summary {
            cursor: pointer;
            list-style: none;
            font-size: .71rem;
            font-weight: 700;
            color: var(--t-voice-details-title);
        }
        .voice-panel summary::-webkit-details-marker {
            display: none;
        }
        .voice-diagnostics {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 8px;
            margin-top: 8px;
        }
        .voice-diagnostic-title {
            margin-bottom: 4px;
            font-size: .66rem;
            font-weight: 700;
            color: var(--t-voice-diag-title);
        }
        .voice-panel-pre {
            margin: 0;
            padding: 7px 8px;
            border-radius: 6px;
            background: var(--t-voice-pre-bg);
            border: 1px solid var(--t-voice-pre-border);
            color: var(--t-voice-pre-text);
            font-size: .63rem;
            line-height: 1.45;
            white-space: pre-wrap;
            word-break: break-word;
            max-height: 170px;
            overflow: auto;
        }

        .status-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: #444;
        }

        .status-dot.pending     { background: #666; }
        .status-dot.connecting  { background: #ffaa00; animation: blink .5s infinite; }
        .status-dot.connected   { background: #00ff88; animation: blink 2s infinite; }
        .status-dot.error       { background: #ff4444; }
        .status-dot.disconnected{ background: #555; }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50%       { opacity: .45; }
        }

        .terminal-wrapper {
            flex: 1;
            background: var(--t-terminal-bg);
            position: relative;
            overflow: hidden;
            min-height: 0;
        }

        .terminal-container.dragging {
            opacity: 0.45;
        }

        .terminal-container.drag-target {
            border-color: var(--t-accent);
            box-shadow: inset 0 0 0 1px rgba(0, 217, 255, 0.65);
        }

        .terminal-surface {
            position: absolute;
            inset: 0;
            padding: 10px 12px 12px;
        }

        .terminal-canvas {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .terminal-canvas .xterm          { height: 100%; }
        .terminal-canvas .xterm-viewport { overflow-y: auto !important; }

        /* ── Terminal context menu ── */
        #term-ctx-menu {
            position: fixed;
            z-index: 9999;
            background: var(--t-ctx-bg);
            border: 1px solid var(--t-ctx-border);
            border-radius: 6px;
            padding: 4px 0;
            min-width: 130px;
            box-shadow: 0 4px 18px rgba(0,0,0,.6);
            font-size: .83rem;
        }
        #term-ctx-menu button {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 7px 14px;
            background: none;
            border: none;
            color: var(--t-text);
            text-align: left;
            cursor: pointer;
            gap: 18px;
            white-space: nowrap;
        }
        #term-ctx-menu button:hover { background: var(--t-ctx-hover); }
        #term-ctx-menu button .shortcut { color: var(--t-text-muted); font-size: .76rem; }

        /* placeholder states */
        .placeholder {
            position: absolute;
            inset: 10px 12px 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--t-text-placeholder);
            gap: 10px;
            pointer-events: none;
            font-size: .8rem;
            padding: 20px;
            text-align: center;
        }

        .placeholder svg { opacity: .5; }

        .placeholder.ph-error { color: #ff6b6b; }
        .placeholder.ph-error .spinner { display: none; }

        .spinner {
            width: 26px; height: 26px;
            border: 2px solid var(--t-spinner-track);
            border-top-color: var(--t-accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* empty state (no sessions) */
        #emptyState {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--t-empty-text);
            gap: 14px;
        }

        #emptyState.visible { display: flex; }
        #emptyState a { color: var(--t-accent); text-decoration: none; }
        #emptyState a:hover { text-decoration: underline; }

        @media (max-width: 700px) {
            #terminalsGrid.layout-single,
            #terminalsGrid.layout-2-vertical,
            #terminalsGrid.layout-2-horizontal,
            #terminalsGrid.layout-3-vertical,
            #terminalsGrid.layout-3-horizontal,
            #terminalsGrid.layout-3-split,
            #terminalsGrid.layout-grid {
                grid-template-columns: 1fr;
                grid-template-rows: none;
            }

            #terminalsGrid.layout-3-split .terminal-container:nth-child(1) {
                grid-column: auto;
                grid-row: auto;
            }

            #terminalsGrid.layout-3-split .terminal-container:nth-child(2) {
                grid-column: auto;
                grid-row: auto;
            }

            #terminalsGrid.layout-3-split .terminal-container:nth-child(3) {
                grid-column: auto;
                grid-row: auto;
            }

            .voice-panel {
                width: min(100vw - 28px, 360px);
                right: -6px;
            }

            .voice-diagnostics {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body
    data-voice-enabled="{{ 'true' if voice_enabled else 'false' }}"
    data-voice-engine="{{ voice_engine | e }}"
    data-voice-model="{{ voice_model | e }}"
    data-voice-language="{{ voice_language | e }}"
    data-voice-worklet-url="{{ url_for('static', filename='voice-capture-worklet.js') }}"
>

<!-- Top bar -->
<div class="topbar">
    <div>
        <span class="topbar-title">GridVibe</span>
        <span class="topbar-sub" id="sessionLabel">Loading…</span>
    </div>
    <div class="topbar-actions">
        <button class="btn btn-neutral" id="themeToggleBtn" onclick="cycleTheme()" title="Toggle theme">🌙 Dark</button>
        <button class="btn btn-cyan" onclick="refreshStatuses()">Refresh all</button>
        <button class="btn btn-danger"  onclick="closeCurrentSession()">Close Session</button>
        <button
            class="btn btn-success btn-icon"
            id="fullscreenBtn"
            onclick="toggleFullscreen()"
            title="Enter fullscreen"
            aria-label="Enter fullscreen"
            aria-pressed="false"
        >&#9974;</button>
        <a
            href="/"
            class="btn btn-neutral btn-icon settings-window-btn"
            onclick="return goToSettings(event)"
            title="Open settings"
            aria-label="Open settings"
        >
            <svg class="vibe-flow-icon" viewBox="0 0 32 32" aria-hidden="true" focusable="false">
                <rect x="5" y="7" width="22" height="18" rx="5" fill="#06263a" stroke="#5eefff" stroke-width="1.4"/>
                <path d="M9 11.5h14" stroke="#63f6ff" stroke-width="2.2" stroke-linecap="round"/>
                <path d="M12 15l4 4-4 4" fill="none" stroke="#6dfcff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M18 22h5" stroke="#4fd6ff" stroke-width="2.2" stroke-linecap="round"/>
            </svg>
        </a>
    </div>
</div>

<div class="session-tabs" id="sessionTabs"></div>

<!-- Grid (built dynamically) -->
<div id="terminalsGrid"></div>

<!-- Empty state -->
<div id="emptyState">
    <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/>
        <line x1="12" y1="17" x2="12" y2="21"/>
    </svg>
    <p>No active sessions.</p>
    <a href="/" onclick="return goToSettings(event)">Launch terminals →</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/socket.io-client@4.7.2/dist/socket.io.min.js"></script>
<script>
    /* ── Theme management ── */
    const THEME_STORAGE_KEY = 'gridvibe.theme';

    function normalizeThemePreference(theme) {
        return ['system', 'light', 'dark'].includes(theme) ? theme : 'system';
    }

    function getStoredTheme() {
        try { return normalizeThemePreference(localStorage.getItem(THEME_STORAGE_KEY)); } catch (_) { return null; }
    }

    function getSystemTheme() {
        return window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
    }

    function resolveTheme(theme) {
        const preference = normalizeThemePreference(theme);
        return preference === 'system' ? getSystemTheme() : preference;
    }

    function applyTheme(theme) {
        const preference = normalizeThemePreference(theme);
        const resolved = resolveTheme(preference);
        document.documentElement.setAttribute('data-theme', resolved);
        document.documentElement.setAttribute('data-theme-preference', preference);
        try { localStorage.setItem(THEME_STORAGE_KEY, preference); } catch (_) {}
        const btn = document.getElementById('themeToggleBtn');
        if (btn) {
            btn.textContent =
                preference === 'light' ? '☀️ Light'
                : preference === 'dark' ? '🌙 Dark'
                : '◐ System';
        }
    }

    function cycleTheme() {
        const current = getStoredTheme() || 'system';
        const nextTheme =
            current === 'system' ? 'light'
            : current === 'light' ? 'dark'
            : 'system';
        applyTheme(nextTheme);
    }

    (function initTheme() {
        applyTheme(getStoredTheme() || 'system');
        const mediaQuery = window.matchMedia('(prefers-color-scheme: light)');
        const listener = () => {
            const themePreference = document.documentElement.getAttribute('data-theme-preference') || getStoredTheme() || 'system';
            if (themePreference === 'system') {
                applyTheme('system');
            }
        };
        if (typeof mediaQuery.addEventListener === 'function') {
            mediaQuery.addEventListener('change', listener);
        } else if (typeof mediaQuery.addListener === 'function') {
            mediaQuery.addListener(listener);
        }
    })();

    /* ─────────────────────────────────────────────
       State  (socket is initialised AFTER functions
       so that a CDN failure can't kill the whole script)
    ───────────────────────────────────────────── */
    let terminals  = [];
    let sessionIds = [];
    let gridBuilt  = false;
    let _focusedTerminalIndex = -1;
    let socket     = null;   // set at the bottom after all defs
    let resizeObservers = [];
    let cachedGroupViews = new Map();
    let sessionRouteMap = new Map();
    let visibleGroupId = '';
    let nativeFullscreen = false;
    let draggedCard = null;
    let draggedSessionTab = null;
    let draggedSessionTabOriginOrder = [];
    let sessionTabDropHandled = false;
    let suppressSessionTabClickUntil = 0;
    let activeGroupId = new URLSearchParams(window.location.search).get('group') || '';
    let sessionGroups = [];
    let activeLoadToken = 0;
    let knownGroupIds = [];

    function getSessionApiPath(groupId = activeGroupId) {
        return groupId
            ? `/api/sessions?group=${encodeURIComponent(groupId)}`
            : '/api/sessions';
    }

    function getGroupById(groupId) {
        return sessionGroups.find(group => group.group_id === groupId) || null;
    }

    function setSessionRoute(sessionId, groupId, index) {
        if (!sessionId || !groupId || !Number.isInteger(index)) {
            return;
        }
        sessionRouteMap.set(sessionId, { groupId, index });
    }

    function clearSessionRoutes(ids) {
        (ids || []).forEach(sessionId => {
            if (sessionId) {
                sessionRouteMap.delete(sessionId);
            }
        });
    }

    function resolveSessionTarget(sessionId) {
        if (!sessionId) {
            return null;
        }

        const route = sessionRouteMap.get(sessionId);
        if (!route) {
            return null;
        }

        if (route.groupId === visibleGroupId) {
            const terminal = terminals[route.index];
            if (!terminal) {
                return null;
            }
            return {
                groupId: route.groupId,
                index: route.index,
                terminal,
                active: true
            };
        }

        const cached = cachedGroupViews.get(route.groupId);
        const terminal = cached?.terminals?.[route.index];
        if (!terminal) {
            return null;
        }

        return {
            groupId: route.groupId,
            index: route.index,
            terminal,
            active: false
        };
    }

    function clearFitTimers(targetTerminals = terminals) {
        (targetTerminals || []).forEach(terminal => {
            if (!terminal?._fitTimer) {
                return;
            }
            clearTimeout(terminal._fitTimer);
            terminal._fitTimer = null;
        });
    }

    function disconnectObservers(targetObservers = resizeObservers) {
        (targetObservers || []).forEach(observer => observer.disconnect());
    }

    function observeTerminalResize(index) {
        const terminal = terminals[index];
        if (!terminal || terminal._resizeObserved || !('ResizeObserver' in window)) {
            return;
        }

        const wrapper = document.getElementById(`tw-${index}`);
        if (!wrapper) {
            return;
        }

        const observer = new ResizeObserver(() => scheduleFit(index));
        observer.observe(wrapper);
        resizeObservers.push(observer);
        terminal._resizeObserved = true;
    }

    function restoreActiveTerminalObservers() {
        resizeObservers = [];
        terminals.forEach((terminal, index) => {
            if (!terminal) {
                return;
            }
            terminal._resizeObserved = false;
            if (terminal._attached) {
                observeTerminalResize(index);
            }
        });
    }

    function updateSessionChrome(count, groupId = activeGroupId) {
        const activeGroup = getGroupById(groupId);
        const labelParts = [
            activeGroup?.name || 'Session',
            `${count} terminal${count !== 1 ? 's' : ''}`,
            activeGroup?.connection_mode === 'wsl' ? 'Local Repo' : 'SSH'
        ].filter(Boolean);
        document.getElementById('sessionLabel').textContent = labelParts.join(' • ');
        document.title = activeGroup?.name
            ? `GridVibe — ${activeGroup.name}`
            : 'GridVibe — Terminals';
    }

    function cacheVisibleGroupView(groupId = visibleGroupId) {
        if (!groupId || !gridBuilt) {
            return;
        }

        _closeVoicePanels(-1);
        _stopAllVoice();
        const grid = document.getElementById('terminalsGrid');
        const fragment = document.createDocumentFragment();

        clearFitTimers(terminals);
        disconnectObservers(resizeObservers);
        terminals.forEach(terminal => {
            if (!terminal) {
                return;
            }
            terminal._resizeObserved = false;
            terminal._fitReady = false;
        });

        while (grid.firstChild) {
            fragment.appendChild(grid.firstChild);
        }

        cachedGroupViews.set(groupId, {
            groupId,
            terminals,
            sessionIds,
            fragment,
            className: grid.className,
            gridColumns: grid.style.getPropertyValue('--grid-columns'),
            gridRows: grid.style.getPropertyValue('--grid-rows')
        });

        terminals = [];
        sessionIds = [];
        resizeObservers = [];
        gridBuilt = false;
        visibleGroupId = '';
        grid.className = '';
        grid.style.removeProperty('--grid-columns');
        grid.style.removeProperty('--grid-rows');
    }

    function restoreCachedGroupView(groupId) {
        const cached = cachedGroupViews.get(groupId);
        if (!cached) {
            return false;
        }

        const grid = document.getElementById('terminalsGrid');
        grid.innerHTML = '';
        grid.className = cached.className || '';
        if (cached.gridColumns) {
            grid.style.setProperty('--grid-columns', cached.gridColumns);
        } else {
            grid.style.removeProperty('--grid-columns');
        }
        if (cached.gridRows) {
            grid.style.setProperty('--grid-rows', cached.gridRows);
        } else {
            grid.style.removeProperty('--grid-rows');
        }
        grid.appendChild(cached.fragment);
        grid.style.display = '';

        terminals = cached.terminals || [];
        sessionIds = cached.sessionIds || [];
        visibleGroupId = groupId;
        gridBuilt = terminals.length > 0;
        terminals.forEach(terminal => {
            if (terminal) {
                terminal._fitReady = false;
                terminal._resizeObserved = false;
            }
        });
        restoreActiveTerminalObservers();
        document.getElementById('emptyState').classList.remove('visible');
        return true;
    }

    function dropCachedGroupView(groupId) {
        const cached = cachedGroupViews.get(groupId);
        if (!cached) {
            return;
        }

        clearFitTimers(cached.terminals || []);
        disconnectObservers(cached.resizeObservers || []);
        if (socket) {
            (cached.sessionIds || []).forEach(sessionId => {
                if (sessionId) {
                    socket.emit('leave_session', { session_id: sessionId });
                }
            });
        }
        clearSessionRoutes(cached.sessionIds || []);
        (cached.terminals || []).forEach(terminal => {
            if (terminal?.term) {
                try { terminal.term.dispose(); } catch (_) {}
            }
        });
        cachedGroupViews.delete(groupId);
    }

    function syncLocationToGroup(groupId) {
        const url = new URL(window.location.href);
        if (groupId) {
            url.searchParams.set('group', groupId);
        } else {
            url.searchParams.delete('group');
        }
        window.history.replaceState({}, '', url);
    }

    const TAB_COLOUR_PALETTE = [
        '#ff6b6b', '#ff922b', '#ffd43b', '#69db7c',
        '#38d9a9', '#4dabf7', '#748ffc', '#da77f2',
        '#f783ac', '#a9e34b',
    ];

    function tabColourForGroup(groupId) {
        let hash = 0;
        for (let i = 0; i < groupId.length; i++) {
            hash = (hash * 31 + groupId.charCodeAt(i)) & 0xffffffff;
        }
        return TAB_COLOUR_PALETTE[Math.abs(hash) % TAB_COLOUR_PALETTE.length];
    }

    function hexToRgba(hex, alpha) {
        const r = parseInt(hex.slice(1, 3), 16);
        const g = parseInt(hex.slice(3, 5), 16);
        const b = parseInt(hex.slice(5, 7), 16);
        return `rgba(${r},${g},${b},${alpha})`;
    }

    function applyTabColour(button, groupId) {
        const colour = tabColourForGroup(groupId);
        button.style.setProperty('--tab-color', colour);
        button.style.setProperty('--tab-color-bg', hexToRgba(colour, 0.14));
        button.style.setProperty('--tab-color-shadow', hexToRgba(colour, 0.45));
        button.style.borderColor = hexToRgba(colour, 0.4);
    }

    function renderSessionTabs() {
        const container = document.getElementById('sessionTabs');
        if (!container) return;

        const settingsButton = document.createElement('button');
        settingsButton.className = 'session-tab settings';
        settingsButton.type = 'button';
        settingsButton.textContent = '+ New Session';
        settingsButton.addEventListener('click', goToSettings);

        container.innerHTML = '';
        container.appendChild(settingsButton);

        sessionGroups.forEach(group => {
            const button = document.createElement('button');
            button.className = `session-tab${group.group_id === activeGroupId ? ' active' : ''} draggable`;
            button.type = 'button';
            button.textContent = group.name || group.group_id;
            button.dataset.groupId = group.group_id;
            applyTabColour(button, group.group_id);
            button.addEventListener('click', event => {
                if (Date.now() < suppressSessionTabClickUntil) {
                    event.preventDefault();
                    return;
                }
                switchGroup(group.group_id);
            });
            wireSessionTabDragAndDrop(button, container);
            container.appendChild(button);
        });
    }

    function setSessionGroupsOrder(orderedGroupIds) {
        const groupsById = new Map(sessionGroups.map(group => [group.group_id, group]));
        const nextGroups = [];
        const seen = new Set();

        orderedGroupIds.forEach(groupId => {
            if (groupsById.has(groupId) && !seen.has(groupId)) {
                nextGroups.push(groupsById.get(groupId));
                seen.add(groupId);
            }
        });

        sessionGroups.forEach(group => {
            if (!seen.has(group.group_id)) {
                nextGroups.push(group);
            }
        });

        sessionGroups = nextGroups;
    }

    function getSessionGroupOrder() {
        return sessionGroups.map(group => group.group_id);
    }

    function hasSameSessionGroupOrder(left, right) {
        if (!Array.isArray(left) || !Array.isArray(right) || left.length !== right.length) {
            return false;
        }
        return left.every((groupId, index) => groupId === right[index]);
    }

    function clearSessionTabDragState() {
        const container = document.getElementById('sessionTabs');
        if (container) {
            container.querySelectorAll('.session-tab.dragging, .session-tab.drag-target')
                .forEach(tab => tab.classList.remove('dragging', 'drag-target'));
        }
        draggedSessionTab = null;
        draggedSessionTabOriginOrder = [];
        sessionTabDropHandled = false;
    }

    function getSessionTabAfterElement(container, clientX) {
        const tabs = [...container.querySelectorAll('.session-tab[data-group-id]:not(.dragging)')];
        return tabs.reduce((closest, tab) => {
            const rect = tab.getBoundingClientRect();
            const offset = clientX - rect.left - (rect.width / 2);
            if (offset < 0 && offset > closest.offset) {
                return { offset, element: tab };
            }
            return closest;
        }, { offset: Number.NEGATIVE_INFINITY, element: null }).element;
    }

    async function persistSessionGroupOrder(groupIds) {
        const response = await fetch('/api/session-groups/order', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ group_ids: groupIds })
        });
        const data = await response.json();
        if (!response.ok) {
            throw new Error(data.error || 'Failed to save session tab order');
        }

        sessionGroups = Array.isArray(data.groups) ? data.groups : [];
        renderSessionTabs();
    }

    function wireSessionTabDragAndDrop(button, container) {
        if (!button || !container) {
            return;
        }

        button.draggable = true;

        button.addEventListener('dragstart', event => {
            draggedSessionTab = button;
            draggedSessionTabOriginOrder = getSessionGroupOrder();
            sessionTabDropHandled = false;
            button.classList.add('dragging');
            if (event.dataTransfer) {
                event.dataTransfer.effectAllowed = 'move';
                event.dataTransfer.setData('text/plain', button.dataset.groupId || '');
            }
        });

        button.addEventListener('dragend', () => {
            suppressSessionTabClickUntil = Date.now() + 250;
            if (!sessionTabDropHandled && draggedSessionTabOriginOrder.length > 0) {
                setSessionGroupsOrder(draggedSessionTabOriginOrder);
                renderSessionTabs();
            }
            clearSessionTabDragState();
        });

        button.addEventListener('dragover', event => {
            if (!draggedSessionTab || draggedSessionTab === button) {
                return;
            }

            event.preventDefault();
            container.querySelectorAll('.session-tab.drag-target')
                .forEach(tab => {
                    if (tab !== button) {
                        tab.classList.remove('drag-target');
                    }
                });
            button.classList.add('drag-target');
        });

        button.addEventListener('dragleave', event => {
            const next = event.relatedTarget;
            if (next && button.contains(next)) {
                return;
            }
            button.classList.remove('drag-target');
        });
    }

    document.addEventListener('DOMContentLoaded', () => {
        const container = document.getElementById('sessionTabs');
        if (!container) {
            return;
        }

        container.addEventListener('dragover', event => {
            if (!draggedSessionTab) {
                return;
            }

            event.preventDefault();
            const afterTab = getSessionTabAfterElement(container, event.clientX);
            if (!afterTab) {
                container.appendChild(draggedSessionTab);
                return;
            }

            if (afterTab !== draggedSessionTab) {
                container.insertBefore(draggedSessionTab, afterTab);
            }
        });

        container.addEventListener('drop', async event => {
            if (!draggedSessionTab) {
                return;
            }

            event.preventDefault();
            sessionTabDropHandled = true;

            const orderedGroupIds = [...container.querySelectorAll('.session-tab[data-group-id]')]
                .map(tab => tab.dataset.groupId)
                .filter(Boolean);
            const previousOrder = draggedSessionTabOriginOrder.slice();

            container.querySelectorAll('.session-tab.drag-target')
                .forEach(tab => tab.classList.remove('drag-target'));

            if (hasSameSessionGroupOrder(previousOrder, orderedGroupIds)) {
                return;
            }

            setSessionGroupsOrder(orderedGroupIds);
            try {
                await persistSessionGroupOrder(orderedGroupIds);
            } catch (error) {
                console.error('Session tab reorder failed:', error);
                setSessionGroupsOrder(previousOrder);
                renderSessionTabs();
            }
        });
    });

    function getLayoutClass(count, layout) {
        if (count === 1) return 'layout-single';
        if (count === 2) return `layout-2-${layout === 'horizontal' ? 'horizontal' : 'vertical'}`;
        if (count === 3) {
            if (layout === 'horizontal') return 'layout-3-horizontal';
            if (layout === 'split') return 'layout-3-split';
            return 'layout-3-vertical';
        }
        if (count >= 4) return 'layout-grid';
        return '';
    }

    function getGridMetrics(count) {
        if (count >= 8) {
            return { columns: 4, rows: 2 };
        }
        if (count >= 6) {
            return { columns: 3, rows: 2 };
        }
        if (count >= 4) {
            return { columns: 2, rows: 2 };
        }
        return null;
    }

    function hasMatchingSessionIds(existingIds, sessions) {
        if (!Array.isArray(existingIds) || !Array.isArray(sessions) || existingIds.length !== sessions.length) {
            return false;
        }

        return existingIds.every((sessionId, index) => sessionId === sessions[index]?.session_id);
    }

    /* ─────────────────────────────────────────────
       Xterm factory
    ───────────────────────────────────────────── */
    function makeTerminal() {
        const term = new Terminal({
            cursorBlink   : true,
            fontSize      : 13,
            fontFamily    : 'Consolas, Monaco, "Courier New", monospace',
            copyOnSelect  : true,
            theme: {
                background : '#0d0d0d',
                foreground : '#e0e0e0',
                cursor     : '#00d9ff',
                selection  : 'rgba(0,217,255,.25)'
            }
        });
        const fitAddon = new FitAddon.FitAddon();
        term.loadAddon(fitAddon);
        return { term, fitAddon };
    }

    function emitTerminalResize(index, force = false) {
        const sid = sessionIds[index];
        const terminal = terminals[index];
        if (!sid || !socket || !terminal?._attached || !terminal.term.cols || !terminal.term.rows) {
            return;
        }

        const cols = terminal.term.cols;
        const rows = terminal.term.rows;

        if (cols < 20 || rows < 5) {
            return;
        }

        // Skip if dimensions haven't changed since last emit
        if (!force && terminal._lastCols === cols && terminal._lastRows === rows) {
            return;
        }
        terminal._lastCols = cols;
        terminal._lastRows = rows;

        socket.emit('terminal_resize', {
            session_id: sid,
            cols,
            rows
        });
    }

    function setTerminalRefreshState(index, refreshing) {
        setTerminalActionState(index, refreshing ? 'refresh' : '');
    }

    function setTerminalClearState(index, clearing) {
        setTerminalActionState(index, clearing ? 'clear' : '');
    }

    function setTerminalActionState(index, action = '') {
        const refreshButton = document.getElementById(`trefresh-${index}`);
        const clearButton = document.getElementById(`tclear-${index}`);
        const isBusy = Boolean(action);

        if (refreshButton) {
            refreshButton.disabled = isBusy;
            refreshButton.textContent = action === 'refresh' ? 'Refreshing…' : '↻';
        }

        if (clearButton) {
            clearButton.disabled = isBusy;
            clearButton.textContent = action === 'clear' ? 'Clearing…' : '🧹';
        }

    }

    function getTerminalClearCommand(index) {
        const session = terminals[index]?._session;
        if (session?.mode === 'wsl' && session?.use_powershell) {
            return 'cls\r';
        }
        if (session?.mode === 'wsl' && !session?.use_wsl) {
            return 'cls\r';
        }
        return 'clear\r';
    }

    function flushPendingOutput(index) {
        const terminal = terminals[index];
        if (!terminal?._attached || !terminal._pendingOutput) {
            return;
        }

        const pendingOutput = terminal._pendingOutput;
        terminal._pendingOutput = '';
        terminal.term.write(pendingOutput);
    }

    function fitTerminal(index) {
        const terminal = terminals[index];
        if (!terminal?._attached) {
            return false;
        }

        const wrapper = document.getElementById(`tw-${index}`);
        if (wrapper) {
            const rect = wrapper.getBoundingClientRect();
            if (rect.height < 20 || rect.width < 50) {
                // Layout not ready — reschedule through the debounced path
                terminal._fitReady = false;
                if (!terminal._fitRetries) terminal._fitRetries = 0;
                if (terminal._fitRetries < 10) {
                    terminal._fitRetries++;
                    scheduleFit(index);
                }
                return false;
            }
        }
        terminal._fitRetries = 0;

        terminal.fitAddon.fit();
        if (terminal.term.rows > 0) {
            terminal.term.refresh(0, terminal.term.rows - 1);
        }
        terminal._fitReady = true;
        emitTerminalResize(index);
        flushPendingOutput(index);
        return true;
    }

    function scheduleFit(index) {
        const terminal = terminals[index];
        if (!terminal) return;

        if (terminal._fitTimer) {
            clearTimeout(terminal._fitTimer);
        }

        terminal._fitTimer = window.setTimeout(() => {
            terminal._fitTimer = null;
            window.requestAnimationFrame(() => fitTerminal(index));
        }, 60);
    }

    function waitForAnimationFrames(count = 1) {
        return new Promise(resolve => {
            function step() {
                count -= 1;
                if (count <= 0) {
                    resolve();
                    return;
                }
                window.requestAnimationFrame(step);
            }
            window.requestAnimationFrame(step);
        });
    }

    function waitForDelay(ms) {
        return new Promise(resolve => {
            window.setTimeout(resolve, ms);
        });
    }

    async function ensureTerminalReady(index, maxAttempts = 12) {
        const terminal = terminals[index];
        if (!terminal?._attached) {
            return false;
        }

        for (let attempt = 0; attempt < maxAttempts; attempt++) {
            if (fitTerminal(index)) {
                return true;
            }
            await waitForAnimationFrames(1);
        }

        return Boolean(terminals[index]?._fitReady);
    }

    async function ensureAttachedTerminalsReady(indices) {
        const uniqueIndices = [...new Set(indices)]
            .filter(index => Number.isInteger(index) && terminals[index]?._attached);
        if (uniqueIndices.length === 0) {
            return;
        }

        await waitForAnimationFrames(2);
        await Promise.all(uniqueIndices.map(index => ensureTerminalReady(index)));
        await waitForAnimationFrames(1);
        uniqueIndices.forEach(index => fitTerminal(index));
    }

    async function redrawAttachedTerminals(indices, { forceResize = false, isCurrent = null } = {}) {
        const uniqueIndices = [...new Set(indices)]
            .filter(index => Number.isInteger(index) && terminals[index]?._attached);
        if (uniqueIndices.length === 0) {
            return;
        }

        const stillCurrent = typeof isCurrent === 'function' ? isCurrent : () => true;
        if (!stillCurrent()) {
            return;
        }

        // Mirror the repaint users get from fullscreen toggles after a hidden
        // session grid becomes visible again and buffered output has replayed.
        await waitForAnimationFrames(2);
        if (!stillCurrent()) {
            return;
        }

        uniqueIndices.forEach(index => scheduleFit(index));
        await waitForAnimationFrames(2);
        if (!stillCurrent()) {
            return;
        }

        uniqueIndices.forEach(index => {
            const terminal = terminals[index];
            if (!terminal?._attached) {
                return;
            }

            fitTerminal(index);
            if (terminal.term.rows > 0) {
                terminal.term.refresh(0, terminal.term.rows - 1);
            }
            if (forceResize) {
                emitTerminalResize(index, true);
            }
        });
    }

    async function redrawAttachedTerminalsLikeFullscreen(indices, { isCurrent = null } = {}) {
        const uniqueIndices = [...new Set(indices)]
            .filter(index => Number.isInteger(index) && terminals[index]?._attached);
        if (uniqueIndices.length === 0) {
            return;
        }

        const stillCurrent = typeof isCurrent === 'function' ? isCurrent : () => true;

        async function redrawPass({ delayMs = 0, dispatchResize = false } = {}) {
            if (delayMs > 0) {
                await waitForDelay(delayMs);
            }
            if (!stillCurrent()) {
                return;
            }

            if (dispatchResize) {
                window.dispatchEvent(new Event('resize'));
                await waitForAnimationFrames(2);
                if (!stillCurrent()) {
                    return;
                }
            }

            await ensureAttachedTerminalsReady(uniqueIndices);
            if (!stillCurrent()) {
                return;
            }

            await redrawAttachedTerminals(uniqueIndices, {
                forceResize: true,
                isCurrent: stillCurrent
            });
        }

        await redrawPass();
        await redrawPass({ dispatchResize: true });
        await redrawPass({ delayMs: 90, dispatchResize: true });
    }

    async function refreshTerminalDisplay(index) {
        const terminal = terminals[index];
        const sessionId = sessionIds[index];
        if (!terminal) {
            return false;
        }

        setTerminalRefreshState(index, true);
        try {
            logSessionWindowAction('Refreshing terminal display', {
                index,
                session_id: sessionId || null,
                attached: Boolean(terminal._attached)
            });

            terminal._pendingOutput = '';

            if (terminal._attached) {
                terminal.term.reset();
                terminal.term.clear();
                await ensureTerminalReady(index);
                emitTerminalResize(index, true);
            } else {
                attachTerminal(index);
                await ensureTerminalReady(index);
            }

            if (sessionId && socket) {
                socket.emit('leave_session', { session_id: sessionId });
                socket.emit('join_session', { session_id: sessionId });
                await redrawAttachedTerminals([index], { forceResize: true });
                return false;
            }

            if (terminal._attached && terminal.term.rows > 0) {
                terminal.term.refresh(0, terminal.term.rows - 1);
            }
        } catch (error) {
            console.error('[GridVibe Sessions] refreshTerminalDisplay failed:', error);
        } finally {
            setTerminalRefreshState(index, false);
        }

        return false;
    }

    async function clearTerminalDisplay(index) {
        const terminal = terminals[index];
        const sessionId = sessionIds[index];
        if (!terminal) {
            return false;
        }

        setTerminalClearState(index, true);
        try {
            logSessionWindowAction('Clearing terminal display', {
                index,
                session_id: sessionId || null,
                attached: Boolean(terminal._attached)
            });

            terminal._pendingOutput = '';
            terminal.term.reset();
            terminal.term.clear();

            if (terminal._attached) {
                await ensureTerminalReady(index);
                emitTerminalResize(index, true);
            }

            if (sessionId && socket && terminal._session?.status === 'connected') {
                const clearCommand = getTerminalClearCommand(index);
                socket.emit('clear_terminal_buffer', { session_id: sessionId });
                socket.emit('terminal_input', { session_id: sessionId, data: clearCommand });
            } else if (sessionId && socket) {
                socket.emit('clear_terminal_buffer', { session_id: sessionId });
            }
        } catch (error) {
            console.error('[GridVibe Sessions] clearTerminalDisplay failed:', error);
        } finally {
            setTerminalClearState(index, false);
        }

        return false;
    }

    function clearDragState(){
        document.querySelectorAll('.terminal-container.dragging, .terminal-container.drag-target')
            .forEach(card => card.classList.remove('dragging', 'drag-target'));
        draggedCard = null;
    }

    function swapTerminalCards(cardA, cardB) {
        if (!cardA || !cardB || cardA === cardB || cardA.parentNode !== cardB.parentNode) {
            return;
        }

        const parent = cardA.parentNode;
        const placeholder = document.createElement('div');

        parent.replaceChild(placeholder, cardA);
        parent.replaceChild(cardA, cardB);
        parent.replaceChild(cardB, placeholder);

        const firstIndex = Number(cardA.dataset.slot);
        const secondIndex = Number(cardB.dataset.slot);
        if (Number.isInteger(firstIndex)) {
            scheduleFit(firstIndex);
        }
        if (Number.isInteger(secondIndex)) {
            scheduleFit(secondIndex);
        }
    }

    function wireCardDragAndDrop(card, header) {
        if (!card || !header) {
            return;
        }

        header.draggable = true;
        header.classList.add('draggable');

        header.addEventListener('dragstart', event => {
            draggedCard = card;
            card.classList.add('dragging');
            if (event.dataTransfer) {
                event.dataTransfer.effectAllowed = 'move';
                event.dataTransfer.setData('text/plain', card.id);
            }
        });

        header.addEventListener('dragend', () => {
            clearDragState();
        });

        card.addEventListener('dragover', event => {
            if (!draggedCard || draggedCard === card) {
                return;
            }

            event.preventDefault();
            document.querySelectorAll('.terminal-container.drag-target')
                .forEach(node => {
                    if (node !== card) {
                        node.classList.remove('drag-target');
                    }
                });
            card.classList.add('drag-target');

            if (event.dataTransfer) {
                event.dataTransfer.dropEffect = 'move';
            }
        });

        card.addEventListener('drop', event => {
            event.preventDefault();
            if (draggedCard && draggedCard !== card) {
                swapTerminalCards(draggedCard, card);
            }
            clearDragState();
        });

        card.addEventListener('dragleave', event => {
            const next = event.relatedTarget;
            if (next && card.contains(next)) {
                return;
            }
            card.classList.remove('drag-target');
        });
    }

    /* ─────────────────────────────────────────────
       Tear down current sessions before switching
    ───────────────────────────────────────────── */
    function teardownCurrentGrid() {
        _closeVoicePanels(-1);
        _stopAllVoice();
        // Leave all active SocketIO rooms so the backend clears
        // client_joined_sessions — buffer will replay on re-join.
        if (socket) {
            sessionIds.forEach(sid => {
                if (sid) socket.emit('leave_session', { session_id: sid });
            });
        }
        clearFitTimers(terminals);
        disconnectObservers(resizeObservers);
        // Dispose xterm instances to free memory
        terminals.forEach(t => {
            if (t && t.term) {
                try { t.term.dispose(); } catch (_) {}
            }
        });
        clearSessionRoutes(sessionIds);
        cachedGroupViews.delete(visibleGroupId);
        resizeObservers = [];
        terminals  = [];
        sessionIds = [];
        gridBuilt  = false;
        _focusedTerminalIndex = -1;
        visibleGroupId = '';
    }
